<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color:#BFC6CF;
  min-height:300vh;
}

/* HERO */
.hero {
  min-height:100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* Footer */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}

/* Imagen */
.background-image-container {
  position:relative;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* CONJUNTOS */
.group {
  position:absolute;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  transition: transform 0.6s ease, opacity 0.6s ease;
  white-space:nowrap;
  opacity:0;
}

/* GRAPA */
.gra { font-size:clamp(100px,15vw,200px); display:inline-block; transition: transform 0.6s ease, opacity 0.4s ease; }
.pa { font-size:clamp(100px,15vw,200px); display:inline-block; transition: transform 0.6s ease, opacity 0.4s ease; }

/* textos de conjunto */
.left-align { font-size:clamp(55px,9.5vw,110px); display:block; text-align:left; padding-left:0.09em; }

/* fade visible */
.visible { opacity:1; transform:translateX(-50%) translateY(0); }

/* PA desplazamiento y fade */
.shift .pa { transform:translateX(0.35em); }
.fade-pa .pa { opacity:0; }

/* Recentrado del grupo */
.recenter { transform: translateX(-50%) translateY(0); left:50%; }

/* Posiciones verticales */
#group-top { top:25%; }
#group-bottom { top:75%; }

#museo { top:21.5%; }
#fia-superior { top:31.5%; }

#esceno { top:71.5%; }
#fia-inferior { top:81.5%; }

</style>
</head>
<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg">

  <!-- SUPERIOR -->
  <div class="group" id="group-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
    <div class="left-align" id="museo">MU5EO</div>
    <div class="left-align" id="fia-superior">FIA</div>
  </div>

  <!-- INFERIOR -->
  <div class="group" id="group-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
    <div class="left-align" id="esceno">E5CENO</div>
    <div class="left-align" id="fia-inferior">FIA</div>
  </div>

</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const groups = [
  {groupId:'group-top', pa: true},
  {groupId:'group-bottom', pa: true}
];

groups.forEach(item => {
  const group = document.getElementById(item.groupId);
  const pa = group.querySelector('.pa');

  const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        // Aparece todo
        group.classList.add('visible');

        // Después de un tiempo PA se mueve
        setTimeout(()=>{
          group.classList.add('shift');
          // Luego PA desaparece y el grupo se centra
          setTimeout(()=>{
            group.classList.add('fade-pa','recenter');
          }, 400);
        },400);

      } else {
        // Reset al salir del viewport
        group.classList.remove('visible','shift','fade-pa','recenter');
      }
    });
  },{
    threshold:0.3
  });

  observer.observe(group);
});
</script>

</body>
</html>
