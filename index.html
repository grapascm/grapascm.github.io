<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
  min-height: 300vh;
}

/* HERO */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* Footer */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}

/* Imagen */
.background-image-container {
  position:relative;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* BASE TEXTO */
.overlay-line {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:clamp(300px,70vw,1200px);
  color:#E4E8ED;
  opacity:0;
  transition:0.5s;
  white-space:nowrap;
}

/* GRAPA */
.center {
  text-align:center;
  font-size:clamp(100px,15vw,200px);
}

/* alineación base */
.left-align {
  text-align:left;
  font-size:clamp(62px,10.5vw,120px);
}

/* margen fino editable */
.left-align span {
  display:inline-block;
  margin-left:0.06em; /* ← AJUSTA AQUÍ A OJO */
}

/* posiciones */
#overlay-top { top:25%; }
#overlay-bottom { top:75%; }

#museo { top:22%; }
#fia-superior { top:30%; }

#esceno { top:72%; }
#fia-inferior { top:80%; }

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="GRAPA">

  <!-- GRAPA -->
  <div class="overlay-line center" id="overlay-top">GRAPA</div>
  <div class="overlay-line center" id="overlay-bottom">GRAPA</div>

  <!-- MUSEOGRAFIA -->
  <div class="overlay-line left-align" id="museo"><span>MU5EO</span></div>
  <div class="overlay-line left-align" id="fia-superior"><span>FIA</span></div>

  <!-- ESCENOGRAFIA -->
  <div class="overlay-line left-align" id="esceno"><span>E5CENO</span></div>
  <div class="overlay-line left-align" id="fia-inferior"><span>FIA</span></div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const ids = ['overlay-top','overlay-bottom','museo','fia-superior','esceno','fia-inferior']
const els = ids.map(id=>document.getElementById(id))
const bg = document.querySelector('.background-image-container')
const vh = window.innerHeight

window.addEventListener('scroll',()=>{
  const y = window.scrollY
  const top = bg.offsetTop
  const h = bg.offsetHeight

  const showTop = (y >= top - vh/2 && y < top + h/2 - vh)
  const showBottom = (y >= top + h/2 - vh/2)

  els[0].style.opacity = showTop ? 1:0
  els[2].style.opacity = showTop ? 1:0
  els[3].style.opacity = showTop ? 1:0

  els[1].style.opacity = showBottom ? 1:0
  els[4].style.opacity = showBottom ? 1:0
  els[5].style.opacity = showBottom ? 1:0
})
</script>

</body>
</html>
