<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA 3.2 - Gracias</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* --- HERO --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding: 20vh 20px 0 20px;
}

h1.hero-text {
  font-size: clamp(45px, 14vw, 200px);
  letter-spacing: 0.04em;
  margin-right: -0.04em; 
  color: #E4E8ED;
  line-height: 0.9;
}

.subtitle {
  margin-top: 8vh;
  font-size: clamp(10px, 2.2vw, 20px);
  letter-spacing: 0.35em;
  margin-right: -0.35em;
  max-width: 85vw;
}

.email-button {
  margin-top: 15vh;
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: 0.3em;
  margin-right: -0.3em;
  text-decoration: none;
  color: #E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding: 15px 30px;
}

/* --- FOOTER FIXED (Secciones 1 y 2) --- */
footer {
  position: fixed;
  bottom: 60px;
  width: 100%;
  text-align: center;
  font-size: clamp(10px, 1vw, 12px);
  opacity: 0.5;
  pointer-events: none;
  z-index: 10;
}

/* --- CONTENEDORES DE IMAGEN --- */
.background-image-container {
  position: relative;
  width: 100%;
}

.background-image-container img {
  width: 100%;
  height: auto;
  display: block;
}

/* --- SECCIONES 1 Y 2 (MUSEO / ESCENO) --- */
.overlay-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  width: clamp(260px, 75vw, 1000px); 
  text-align: left;
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}

.center { font-size: clamp(40px, 15vw, 200px); }
#museo { font-size: clamp(25px, 9.5vw, 110px); top: 21.5%; }
#overlay-top { top: 25%; }
#fia-superior { font-size: clamp(35px, 12vw, 150px); top: 31.5%; }

#esceno { font-size: clamp(22px, 9vw, 100px); top: 71.5%; }
#overlay-bottom { top: 75%; }
#fia-inferior { font-size: clamp(35px, 12vw, 150px); top: 81.5%; }

/* Animaciones v2.1 */
.overlay-line span { display: inline-block; transition: transform 0.6s ease, opacity 0.4s ease; }
.shift .pa { transform: translateX(0.35em); transition-delay: 0.5s; }
.fade-pa .pa { opacity: 0 !important; visibility: hidden; }
.recenter { transform: translateX(-50%) translateY(0) translateX(-8%); }
.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
.delay-1 { transition-delay: 0.1s; }
.delay-2 { transition-delay: 0.4s; }
.delay-3 { transition-delay: 0.7s; }

/* Ajuste móvil para secciones 1 y 2 */
@media (max-width: 600px) {
  #museo { top: 19%; }
  #fia-superior { top: 33%; }
  #esceno { top: 69%; }
  #fia-inferior { top: 83%; }
}

/* --- SECCIÓN 3: GRACIAS --- */
#img-container-3 {
  /* Imagen de fondo específica para esta sección */
  position: relative;
}

.thanks-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translateX(-50%) translateY(-50%) translateY(20px);
  width: clamp(280px, 85vw, 1200px);
  text-align: left; /* Alineado a la G igual que los otros */
  font-size: clamp(40px, 15vw, 200px); 
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.8s ease, transform 0.8s ease;
  white-space: nowrap;
  pointer-events: none;
}

/* Base de los spans */
.thanks-overlay span {
  display: inline-block;
  opacity: 1;
  transition: opacity 0.4s ease, transform 0.6s ease, width 0.6s ease;
}

/* Estado inicial de la extensión (CIAS) */
.extension-cias {
  opacity: 0 !important;
  width: 0;
  overflow: hidden;
  letter-spacing: -1em;
  transform: scaleX(0);
}

/* PASO 1 (Mismo Shift que los otros GRAPA) */
.shift-3 .pa-3 {
  transform: translateX(0.35em);
  transition-delay: 0.5s; /* El retraso original */
}

/* PASO 2: GRA desaparece y la PA compacta a la izq */
.fade-compact-gra .gra-3 {
  opacity: 0 !important;
  width: 0;
  visibility: hidden;
}

/* PASO 3: Desarrollo de CIAS desde la PA */
.develop-acias .pa-3 {
  /* No tocamos la PA, solo la expansión */
}

.develop-acias .extension-cias {
  opacity: 1 !important;
  width: auto;
  letter-spacing: normal;
  transform: scaleX(1);
}

/* Movimiento final para que el bloque resultante (GRACIAS) esté centrado */
.recenter-3-acias {
  /* Se recentra un poco más (-12%) porque GRACIAS es más ancho que GRAPA */
  transform: translateX(-50%) translateY(-50%) translateY(0) translateX(-12%);
}

.visible-3-cias {
  opacity: 1;
  transform: translateX(-50%) translateY(-50%) translateY(0);
}

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">

  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line delay-2" id="museo">MU5EO</div>
  <div class="overlay-line delay-3" id="fia-superior">FIA</div>

  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line delay-3" id="fia-inferior">FIA</div>
</div>

<div class="background-image-container" id="img-container-3">
  <img src="images/grapa2.jpg" alt="Otra sección">

  <div class="thanks-overlay" id="thanks-group">
    <span class="gra-3">GRA</span><span class="pa-3">PA</span>
    <span class="acias-text extension-cias">CIAS</span>
  </div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
/* SECCIONES 1 Y 2 (v1.0 / v2.1) */
const sections = [
  ['overlay-top', 'museo', 'fia-superior'],
  ['overlay-bottom', 'esceno', 'fia-inferior']
];

sections.forEach(group => {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const m = document.getElementById(group[0]), s1 = document.getElementById(group[1]), s2 = document.getElementById(group[2]);
      if (entry.isIntersecting) {
        m.classList.add('visible', 'shift'); s1.classList.add('visible'); s2.classList.add('visible');
        setTimeout(() => { if (m.classList.contains('visible')) { m.classList.add('fade-pa', 'recenter'); s1.classList.add('recenter'); s2.classList.add('recenter'); } }, 1200);
      } else { [m, s1, s2].forEach(el => el.classList.remove('visible', 'shift', 'fade-pa', 'recenter')); }
    });
  }, { threshold: 0.15 });
  obs.observe(document.getElementById(group[0]));
});


/* SECCIÓN 3: GRACIAS (Coreografía Específica) */
const thanksGroup = document.getElementById('thanks-group');

const obs3 = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      // 1. Aparece centrado e INICIA el Shift (Misma lógica 1.0)
      thanksGroup.classList.add('visible-3-cias', 'shift-3');

      // 2. Cronometramos: 1.2s (Mismo tiempo que los otros)
      // Disparamos la extinción de GRA y el desarrollo de ACIAS.
      setTimeout(() => {
        if (!thanksGroup.classList.contains('visible-3-cias')) return;
        thanksGroup.classList.add('fade-compact-gra', 'develop-acias', 'recenter-3-acias');
      }, 1200);
    } else {
      // Reset total
      thanksGroup.classList.remove('visible-3-cias', 'shift-3', 'fade-compact-gra', 'develop-acias', 'recenter-3-acias');
    }
  });
}, { threshold: 0.3 }); // Mayor threshold para que el usuario vea la animación entera

obs3.observe(document.getElementById('img-container-3'));
</script>

</body>
</html>
