<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('/fonts/GRAPA.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  font-family: 'GRAPA', sans-serif;
  background-color: #0A1A2A;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #BFC6CF;
  padding: 20px;
}

.container {
  padding: 20px;
  text-transform: uppercase;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
}

h1 {
  font-size: clamp(60px, 20vw, 200px);
  letter-spacing: 0.04em;
  color: #E4E8ED;
  line-height: 1;
  word-break: break-word;
}

/* Ajuste para móviles muy pequeños */
@media (max-width: 480px) {
  h1 {
    font-size: clamp(50px, 18vw, 80px);
  }
}

.subtitle {
  margin-top: 10px;
  font-size: clamp(12px, 4vw, 20px);
  letter-spacing: 0.2em;
  line-height: 1.4;
}

@media (min-width: 768px) {
  .subtitle {
    letter-spacing: 0.35em;
  }
}

.email {
  margin-top: clamp(30px, 8vw, 60px);
  font-size: clamp(16px, 5vw, 26px);
  letter-spacing: 0.08em;
  white-space: nowrap; /* Evita que se rompa el email */
}

@media (min-width: 768px) {
  .email {
    letter-spacing: 0.12em;
  }
}

/* Para móviles muy pequeños, permitimos que se ajuste */
@media (max-width: 360px) {
  .email {
    font-size: 14px;
    white-space: normal; /* Permite salto de línea solo si es extremo */
    word-break: break-all;
  }
}

.cta {
  margin-top: clamp(20px, 5vw, 25px);
  font-size: clamp(14px, 4vw, 20px);
  letter-spacing: 0.2em;
  cursor: pointer;
  transition: opacity 0.3s ease;
  display: inline-block;
}

@media (min-width: 768px) {
  .cta {
    letter-spacing: 0.4em;
  }
}

.cta:hover {
  opacity: 0.6;
}

a {
  text-decoration: none;
  color: inherit;
  display: inline-block;
  padding: 10px; /* Área táctil más grande sin romper el diseño */
}

/* ESTILOS PARA LA @ DE GRAPAS - VERSIÓN SIMPLE Y EFECTIVA */
.grapa-at {
  display: inline-block;
  position: relative;
  font-family: 'GRAPA', sans-serif; /* Usamos la misma fuente */
  color: #BFC6CF;
  margin: 0 2px;
}

/* Las "grapas" como pequeños cuadrados alrededor de la @ */
.grapa-at::before,
.grapa-at::after {
  content: '';
  position: absolute;
  width: 0.15em;
  height: 0.15em;
  background-color: #BFC6CF;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 1px;
  pointer-events: none;
}

/* Grapas superiores */
.grapa-at::before {
  top: -0.1em;
  box-shadow: 
    0.25em 0 0 0 #BFC6CF,
    -0.25em 0 0 0 #BFC6CF;
}

/* Grapas inferiores */
.grapa-at::after {
  bottom: -0.1em;
  box-shadow: 
    0.25em 0 0 0 #BFC6CF,
    -0.25em 0 0 0 #BFC6CF;
}

/* Ajuste para móvil */
@media (max-width: 480px) {
  .grapa-at::before,
  .grapa-at::after {
    width: 0.2em;
    height: 0.2em;
  }
  
  .grapa-at::before {
    box-shadow: 
      0.2em 0 0 0 #BFC6CF,
      -0.2em 0 0 0 #BFC6CF;
  }
  
  .grapa-at::after {
    box-shadow: 
      0.2em 0 0 0 #BFC6CF,
      -0.2em 0 0 0 #BFC6CF;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <div class="email">
    <span class="grapa-at">@</span>grapa.es
  </div>
  <div class="cta">
    <a href="mailto:grapa@grapa.es">Contactar Ya</a>
  </div>
</div>

</body>
</html>
