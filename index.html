<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'GRAPA',sans-serif;
  text-transform:uppercase;
  background:#0A1A2A;
  color:#E4E8ED;
  overflow-x:hidden;
}

/* HERO */
.hero{
  min-height:100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20vh;
  text-align:center;
}

.hero h1{
  font-size:clamp(80px,15vw,200px);
  line-height:0.9;
}

.subtitle{
  margin-top:8vh;
  letter-spacing:0.35em;
}

.email{
  margin-top:18vh;
  border:1px solid rgba(255,255,255,0.2);
  padding:1vh 2vw;
  text-decoration:none;
  color:white;
}

/* IMAGEN */
.bg{
  position:relative;
}

.bg img{
  width:100%;
  height:auto;
  display:block;
}

/* TEXTO BASE */
.overlay{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:clamp(300px,70vw,1200px);
  opacity:0;
  transition:0.6s ease;
  white-space:nowrap;
}

/* GRAPA */
.grapa{
  text-align:center;
  font-size:clamp(100px,15vw,200px);
}

.grapa span{
  display:inline-block;
  transition:0.6s ease;
}

/* PA animación */
.shift .pa{
  transform:translateX(0.35em);
}

.fade .pa{
  opacity:0;
}

/* BLOQUES */
.left{
  text-align:left;
  padding-left:0.08em;
}

.museo{font-size:clamp(55px,9.5vw,110px);}
.esceno{font-size:clamp(50px,9vw,100px);}
.fia{font-size:clamp(65px,11vw,140px);}

/* POSICIONES */
#grapa-top{top:25%;}
#grapa-bottom{top:75%;}

#museo{top:21.5%;}
#fia-top{top:31.5%;}

#esceno{top:71.5%;}
#fia-bottom{top:81.5%;}

/* visible */
.show{
  opacity:1;
}
/* MOBILE FIX REAL */
@media(max-width:768px){

  .hero{
    padding-top:15vh;
  }

  .hero h1{
    font-size:clamp(60px,18vw,120px);
  }

  .email{
    margin-top:12vh;
    padding:1vh 4vw;
  }

 /* ===== FIX PRO CENTRADO ===== */

.bg{
  height:200vh;
  position:relative;
}

.bg img{
  position:sticky;
  top:0;
  height:100vh;
  width:100%;
  object-fit:cover;
}

/* overlays centrados en viewport */
.overlay{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85vw;
}

/* ajuste fino vertical */
#museo{ transform:translate(-50%,-70%); }
#fia-top{ transform:translate(-50%,-30%); }

#esceno{ transform:translate(-50%,-70%); }
#fia-bottom{ transform:translate(-50%,-30%); }

  .grapa{
    font-size:clamp(70px,18vw,130px);
  }

  .museo,.esceno{
    font-size:clamp(45px,12vw,90px);
  }

  .fia{
    font-size:clamp(50px,14vw,100px);
  }
}

</style>
</head>

<body>

<div class="hero">
  <h1>GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email">grapa@grapa.e5</a>
</div>

<div class="bg">
  <img src="images/grapas.jpg">

  <!-- TOP -->
  <div class="overlay grapa" id="grapa-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>

  <div class="overlay left museo" id="museo">MU5EO</div>
  <div class="overlay left fia" id="fia-top">FIA</div>

  <!-- BOTTOM -->
  <div class="overlay grapa" id="grapa-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>

  <div class="overlay left esceno" id="esceno">E5CENO</div>
  <div class="overlay left fia" id="fia-bottom">FIA</div>
</div>

<script>
const el = id => document.getElementById(id)

const topG = el('grapa-top')
const bottomG = el('grapa-bottom')

const museo = el('museo')
const fiaTop = el('fia-top')

const esceno = el('esceno')
const fiaBottom = el('fia-bottom')

const bg = document.querySelector('.bg')

window.addEventListener('scroll',()=>{

  const y = window.scrollY
  const vh = window.innerHeight
  const top = bg.offsetTop
  const h = bg.offsetHeight

  /* ===== TOP ===== */

  const showTop = y >= top - vh/2 && y < top + h/2 - vh

  if(showTop){
    topG.classList.add('show')

    setTimeout(()=>{
      museo.classList.add('show')
      fiaTop.classList.add('show')
    },150)

    setTimeout(()=>{
      topG.classList.add('shift')
    },300)

    setTimeout(()=>{
      topG.classList.add('fade')
    },600)

  }else{
    topG.classList.remove('show','shift','fade')
    museo.classList.remove('show')
    fiaTop.classList.remove('show')
  }

  /* ===== BOTTOM ===== */

  const showBottom = y >= top + h/2 - vh/2

  if(showBottom){
    bottomG.classList.add('show')

    setTimeout(()=>{
      esceno.classList.add('show')
      fiaBottom.classList.add('show')
    },150)

    setTimeout(()=>{
      bottomG.classList.add('shift')
    },300)

    setTimeout(()=>{
      bottomG.classList.add('fade')
    },600)

  }else{
    bottomG.classList.remove('show','shift','fade')
    esceno.classList.remove('show')
    fiaBottom.classList.remove('show')
  }

})
</script>

</body>
</html>
