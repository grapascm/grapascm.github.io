<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA 3.8 - Seda</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* --- HERO --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding: 20vh 20px 0 20px;
}

h1.hero-text {
  font-size: clamp(45px, 14vw, 200px);
  letter-spacing: 0.04em;
  margin-right: -0.04em; 
  color: #E4E8ED;
  line-height: 0.9;
}

/* --- SECCIONES 1 Y 2 --- */
.background-image-container { position: relative; width: 100%; }
.background-image-container img { width:100%; height:auto; display:block; }

.overlay-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  width: clamp(260px, 75vw, 1000px); 
  text-align: left;
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
}

.center { font-size: clamp(40px, 15vw, 200px); }
#museo { font-size: clamp(25px, 9.5vw, 110px); top: 21.5%; }
#overlay-top { top: 25%; }
#fia-superior { font-size: clamp(35px, 12vw, 150px); top: 31.5%; }

#esceno { font-size: clamp(22px, 9vw, 100px); top: 71.5%; }
#overlay-bottom { top: 75%; }
#fia-inferior { font-size: clamp(35px, 12vw, 150px); top: 81.5%; }

.overlay-line span { display: inline-block; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease; }
.shift .pa { transform: translateX(0.35em); transition-delay: 0.4s; }
.fade-pa .pa { opacity: 0 !important; }
.recenter { transform: translateX(-50%) translateY(0) translateX(-8%); }
.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* --- SECCIÓN 3: GRACIA5 (COREOGRAFÍA SUAVE) --- */
.thanks-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translateX(-50%) translateY(-50%);
  display: flex;
  align-items: center;
  font-size: clamp(25px, 9.5vw, 120px); 
  color: #E4E8ED;
  opacity: 0;
  /* Transición de entrada del bloque entero */
  transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), transform 1s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
}

.thanks-overlay span { 
  display: inline-block; 
}

/* PA3: Movimiento fluido */
.pa-3 {
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  width: auto;
}

/* CIA5: Aparece expandiéndose suavemente */
.extension-cia5 {
  width: 0;
  opacity: 0;
  overflow: hidden;
  transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  letter-spacing: 0.05em;
}

/* 1. SEPARACIÓN: Suave y con aire */
.shift-3 .pa-3 {
  transform: translateX(0.45em);
}

/* 2. TRANSICIÓN LIMPIA: La PA se desvanece y la CIA5 entra en el mismo flujo */
.fade-pa-3 .pa-3 {
  opacity: 0 !important;
  width: 0;
  pointer-events: none;
}

.become-thanks .extension-cia5 {
  width: 1.8em; /* Un ancho estimado para que el flujo sea constante */
  opacity: 1;
  margin-right: 0.1em;
}

/* Recentrado final del bloque GRACIA5 sin saltos */
.recenter-3 {
  /* Al eliminar la PA y añadir CIA5, flexbox mantiene el centro, 
     pero este ajuste fino lo clava visualmente */
  transform: translateX(-50%) translateY(-50%) translateX(0);
}

.visible-3 { opacity: 1; }

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">
  <div class="overlay-line center" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="museo">MU5EO</div>
  <div class="overlay-line" id="fia-superior">FIA</div>

  <div class="overlay-line center" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="esceno">E5CENO</div>
  <div class="overlay-line" id="fia-inferior">FIA</div>
</div>

<div class="background-image-container" id="container-3">
  <img src="images/grapa2.jpg" alt="Gracias">
  <div class="thanks-overlay" id="thanks-group">
    <span class="gra-3">GRA</span>
    <span class="extension-cia5">CIA5</span>
    <span class="pa-3">PA</span>
  </div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
/* SECCIONES 1 Y 2 */
const sections = [['overlay-top', 'museo', 'fia-superior'], ['overlay-bottom', 'esceno', 'fia-inferior']];
sections.forEach(group => {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const m = document.getElementById(group[0]), s1 = document.getElementById(group[1]), s2 = document.getElementById(group[2]);
      if (entry.isIntersecting) {
        m.classList.add('visible', 'shift'); s1.classList.add('visible'); s2.classList.add('visible');
        setTimeout(() => { if (m.classList.contains('visible')) { m.classList.add('fade-pa', 'recenter'); s1.classList.add('recenter'); s2.classList.add('recenter'); } }, 1300);
      } else { [m, s1, s2].forEach(el => el.classList.remove('visible', 'shift', 'fade-pa', 'recenter')); }
    });
  }, { threshold: 0.15 });
  obs.observe(document.getElementById(group[0]));
});

/* SECCIÓN 3: GRACIA5 (COREOGRAFÍA LIGERA) */
const tGroup = document.getElementById('thanks-group');
const obs3 = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      // 1. Entrada suave
      tGroup.classList.add('visible-3');
      
      // 2. Separación "aireada"
      setTimeout(() => tGroup.classList.add('shift-3'), 800);
      
      // 3. Fundido cruzado (PA se va, CIA5 entra)
      setTimeout(() => {
        if (!tGroup.classList.contains('visible-3')) return;
        tGroup.classList.add('fade-pa-3');
        
        // Empieza a entrar CIA5 justo un poco después de que PA empiece a irse
        setTimeout(() => {
          tGroup.classList.add('become-thanks', 'recenter-3');
        }, 200); 
        
      }, 2000); 
    } else {
      tGroup.classList.remove('visible-3', 'shift-3', 'fade-pa-3', 'become-thanks', 'recenter-3');
    }
  });
}, { threshold: 0.4 });
obs3.observe(document.getElementById('container-3'));
</script>

</body>
</html>
