<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
  min-height: 300vh;
}

/* HERO */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* Footer */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}

/* Imagen */
.background-image-container {
  position:relative;
}

.background-image-container img {
  width:100%;
  height:auto;
}

/* BASE TEXTO */
.overlay-line {
  position:absolute;
  color:#E4E8ED;
  opacity:0;
  transition:0.5s;
  white-space:nowrap;
}

/* GRAPA */
.center {
  text-align:center;
  font-size:clamp(100px,15vw,200px);
  left:50%;
  transform:translateX(-50%);
}

/* alineados con G */
.left-align {
  text-align:left;
  padding-left:0.09em; /* margen tras la G */
  transition:0.5s;
}

/* tamaños */
#museo { font-size:clamp(55px,9.5vw,110px);}
#esceno { font-size:clamp(50px,9vw,100px);}
#fia-superior,#fia-inferior { font-size:clamp(70px,12vw,150px);}

/* posiciones iniciales */
#overlay-top { top:25%; }
#overlay-bottom { top:75%; }

#museo { top:21.5%; left:calc(50% - 7vw); transform:none;}
#fia-superior { top:31.5%; left:calc(50% - 7vw); transform:none;}

#esceno { top:71.5%; left:calc(50% - 7vw); transform:none;}
#fia-inferior { top:81.5%; left:calc(50% - 7vw); transform:none;}

/* Recenter cuando PA desaparece */
.recenter {
  left:50% !important;
  transform:translateX(-50%) !important;
}

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg">

  <!-- GRAPA -->
  <div class="overlay-line center" id="overlay-top">GRAPA</div>
  <div class="overlay-line center" id="overlay-bottom">GRAPA</div>

  <!-- MUSEOGRAFIA -->
  <div class="overlay-line left-align" id="museo">MU5EO</div>
  <div class="overlay-line left-align" id="fia-superior">FIA</div>

  <!-- ESCENOGRAFIA -->
  <div class="overlay-line left-align" id="esceno">E5CENO</div>
  <div class="overlay-line left-align" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const els = {
  top: document.getElementById('overlay-top'),
  bottom: document.getElementById('overlay-bottom'),
  museo: document.getElementById('museo'),
  fiaSup: document.getElementById('fia-superior'),
  esceno: document.getElementById('esceno'),
  fiaInf: document.getElementById('fia-inferior')
};

const bg = document.querySelector('.background-image-container');
const vh = window.innerHeight;

window.addEventListener('scroll',()=>{
  const y = window.scrollY;
  const top = bg.offsetTop;
  const h = bg.offsetHeight;

  // Mitad superior
  const showTop = (y >= top - vh/2 && y < top + h/2 - vh);
  els.top.style.opacity = showTop ? 1:0;

  if(showTop){
    els.museo.style.opacity = 1;
    els.fiaSup.style.opacity = 1;

    // Animación PA: desplazamos "PA" de GRAPA a la derecha
    els.top.style.transform = 'translateX(-35%)';
    // Después de 0.6s centramos el conjunto
    setTimeout(()=>{
      els.top.style.opacity = 0; // PA desaparece
      els.museo.classList.add('recenter');
      els.fiaSup.classList.add('recenter');
      els.top.classList.remove('center'); // quitamos clase para no interferir
    },600);
  } else {
    els.top.style.opacity = 0;
    els.museo.style.opacity = 0;
    els.fiaSup.style.opacity = 0;
    els.museo.classList.remove('recenter');
    els.fiaSup.classList.remove('recenter');
    els.top.classList.add('center');
    els.top.style.transform = 'translateX(-50%)';
  }

  // Mitad inferior
  const showBottom = (y >= top + h/2 - vh/2);
  els.bottom.style.opacity = showBottom ? 1:0;

  if(showBottom){
    els.esceno.style.opacity = 1;
    els.fiaInf.style.opacity = 1;

    els.bottom.style.transform = 'translateX(-35%)';
    setTimeout(()=>{
      els.bottom.style.opacity = 0;
      els.esceno.classList.add('recenter');
      els.fiaInf.classList.add('recenter');
      els.bottom.classList.remove('center');
    },600);
  } else {
    els.bottom.style.opacity = 0;
    els.esceno.style.opacity = 0;
    els.fiaInf.style.opacity = 0;
    els.esceno.classList.remove('recenter');
    els.fiaInf.classList.remove('recenter');
    els.bottom.classList.add('center');
    els.bottom.style.transform = 'translateX(-50%)';
  }
});
</script>

</body>
</html>
