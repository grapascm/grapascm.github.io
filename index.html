<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  min-height: 300vh;
}

/* HERO */
.hero {
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding-top: 20vh;
  padding-left: 1rem;
  padding-right: 1rem;
}

h1.hero-text {
  font-size: clamp(60px, 15vw, 200px);
  letter-spacing: 0.04em;
  color: #E4E8ED;
  line-height: 0.9;
}

.subtitle {
  margin-top: 8vh;
  font-size: clamp(12px, 2vw, 20px);
  letter-spacing: 0.25em;
}

.email-button {
  margin-top: 18vh;
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: 0.25em;
  text-decoration: none;
  color: #E4E8ED;
  border: 1px solid rgba(228,232,237,0.2);
  padding: 1.2vh 5vw;
}

/* Footer */
footer {
  position: fixed;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: clamp(9px, 1vw, 12px);
  opacity: 0.5;
}

/* ────────────────────────────────────────
   CONTENEDOR DE IMAGEN
──────────────────────────────────────── */
.background-image-container {
  position: relative;
}

.background-image-container img {
  width: 100%;
  height: auto;
  display: block;
}

/* ────────────────────────────────────────
   TEXTOS OVERLAY — DESKTOP (≥ 768px)
   Posición absoluta sobre la imagen,
   calibrada sobre la proporción original.
──────────────────────────────────────── */
.overlay-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  width: clamp(300px, 70vw, 1200px);
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}

/* GRAPA grande */
.center {
  text-align: center;
  font-size: clamp(100px, 15vw, 200px);
}

.center span {
  display: inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

/* PA se desplaza */
.shift .pa {
  transform: translateX(0.35em);
  transition-delay: 0.5s;
}

/* PA desaparece */
.fade-pa .pa {
  opacity: 0;
}

/* RECENTER */
.recenter {
  transform: translateX(-50%) translateY(0) translateX(-8%);
}

/* Alineación izquierda */
.left-align {
  text-align: left;
  padding-left: 0.09em;
}

/* Tamaños secundarios */
#museo   { font-size: clamp(55px, 9.5vw, 110px); }
#esceno  { font-size: clamp(50px, 9vw,   100px); }
#fia-superior, #fia-inferior { font-size: clamp(70px, 12vw, 150px); }

/* Posiciones verticales sobre la imagen (desktop) */
#overlay-top    { top: 25%; }
#overlay-bottom { top: 75%; }
#museo          { top: 21.5%; }
#fia-superior   { top: 31.5%; }
#esceno         { top: 71.5%; }
#fia-inferior   { top: 81.5%; }

/* Visible */
.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Delays */
.delay-1 { transition-delay: 0.1s; }
.delay-2 { transition-delay: 0.4s; }
.delay-3 { transition-delay: 0.7s; }


/* ────────────────────────────────────────
   MODO MÓVIL (< 768px)
   Los textos salen del flujo absoluto
   y se apilan debajo de la imagen en
   dos bloques (superior / inferior).
──────────────────────────────────────── */
@media (max-width: 767px) {

  /* Revertimos el posicionamiento absoluto */
  .overlay-line {
    position: static;
    transform: none;
    width: 100%;
    white-space: normal;          /* permite salto de línea */
    padding: 0 1rem;
    opacity: 1;                   /* siempre visible en móvil */
    transition: none;
  }

  /* El contenedor ya no necesita ser relative para hijos */
  .background-image-container {
    position: static;
  }

  /* Bloques de texto móvil */
  .mobile-block {
    padding: 2rem 1rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  /* Tamaños adaptativos en móvil */
  .center          { font-size: clamp(60px, 18vw, 120px); }
  #museo           { font-size: clamp(36px, 10vw,  70px); }
  #esceno          { font-size: clamp(32px, 9vw,   65px); }
  #fia-superior,
  #fia-inferior    { font-size: clamp(50px, 14vw,  90px); }

  /* Ocultamos los IDs de posición absurd en móvil — se muestran vía bloques */
  #overlay-top, #overlay-bottom,
  #museo, #esceno, #fia-superior, #fia-inferior {
    display: none;
  }

  /* Mostramos los bloques móvil */
  .mobile-block { display: flex; }

  footer {
    position: static;
    padding: 2rem 0 3rem;
    opacity: 0.5;
  }
}

/* Ocultar bloques móvil en desktop */
.mobile-block {
  display: none;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<!-- IMAGEN CON OVERLAYS (desktop) -->
<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">

  <!-- SUPERIOR — desktop overlay -->
  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
  <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>

  <!-- INFERIOR — desktop overlay -->
  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
</div>

<!-- BLOQUE SUPERIOR — móvil (después de la imagen) -->
<div class="mobile-block" id="mobile-top">
  <div class="center" style="color:#E4E8ED">
    <span>GRA</span><span>PA</span>
  </div>
  <div style="font-size:clamp(36px,10vw,70px);color:#E4E8ED;text-align:left;padding-left:0.09em">MU5EO</div>
  <div style="font-size:clamp(50px,14vw,90px);color:#E4E8ED;text-align:left;padding-left:0.09em">FIA</div>
</div>

<!-- BLOQUE INFERIOR — móvil -->
<div class="mobile-block" id="mobile-bottom">
  <div class="center" style="color:#E4E8ED">
    <span>GRA</span><span>PA</span>
  </div>
  <div style="font-size:clamp(32px,9vw,65px);color:#E4E8ED;text-align:left;padding-left:0.09em">E5CENO</div>
  <div style="font-size:clamp(50px,14vw,90px);color:#E4E8ED;text-align:left;padding-left:0.09em">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<!-- Script solo activo en desktop (overlays) -->
<script>
if (window.innerWidth >= 768) {
  const sections = [
    ['overlay-top',    'museo',  'fia-superior'],
    ['overlay-bottom', 'esceno', 'fia-inferior']
  ];

  sections.forEach(group => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        group.forEach(id => {
          const el = document.getElementById(id);
          if (!el) return;

          if (entry.isIntersecting) {
            el.classList.add('visible');

            if (id === 'museo') {
              setTimeout(() => {
                const top = document.getElementById('overlay-top');
                top.classList.add('shift');
                setTimeout(() => {
                  top.classList.add('fade-pa', 'recenter');
                  document.getElementById('museo').classList.add('recenter');
                  document.getElementById('fia-superior').classList.add('recenter');
                }, 400);
              }, 400);
            }

            if (id === 'esceno') {
              setTimeout(() => {
                const bottom = document.getElementById('overlay-bottom');
                bottom.classList.add('shift');
                setTimeout(() => {
                  bottom.classList.add('fade-pa', 'recenter');
                  document.getElementById('esceno').classList.add('recenter');
                  document.getElementById('fia-inferior').classList.add('recenter');
                }, 400);
              }, 400);
            }

          } else {
            el.classList.remove('visible');

            if (id === 'museo') {
              const top = document.getElementById('overlay-top');
              top.classList.remove('shift', 'fade-pa', 'recenter');
              document.getElementById('museo').classList.remove('recenter');
              document.getElementById('fia-superior').classList.remove('recenter');
            }

            if (id === 'esceno') {
              const bottom = document.getElementById('overlay-bottom');
              bottom.classList.remove('shift', 'fade-pa', 'recenter');
              document.getElementById('esceno').classList.remove('recenter');
              document.getElementById('fia-inferior').classList.remove('recenter');
            }
          }
        });
      });
    }, { threshold: 0.3 });

    observer.observe(document.getElementById(group[0]));
  });
}
</script>

</body>
</html>
