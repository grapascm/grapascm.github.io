<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
  min-height: 200vh;
  position: relative;
}

/* HERO (pantalla inicial) con más aire arriba */
.hero {
  position: relative;
  height: 100svh;
  display: flex;
  flex-direction: column;
  justify-content: flex-start; /* permite aire arriba */
  align-items: center;
  z-index: 2;
  text-align: center;
  padding-top: 15vh; /* más espacio arriba adaptativo */
  padding-left: 5vw;
  padding-right: 5vw;
}

h1 {
  font-size: clamp(80px, 15vw, 200px);
  letter-spacing: 0.04em;
  color: #E4E8ED;
  line-height: 0.9;
}

.subtitle {
  margin-top: 5vh;
  font-size: clamp(14px, 2vw, 20px);
  letter-spacing: 0.35em;
  opacity: 0.8;
}

.email-button {
  display: inline-block;
  margin-top: 8vh;
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: 0.3em;
  text-decoration: none;
  color: #E4E8ED;
  border: 1px solid rgba(228, 232, 237, 0.2);
  padding: 1vh 2vw;
  transition: all 0.3s ease;
  opacity: 0.7;
}

.email-button:hover {
  background-color: #E4E8ED;
  color: #0A1A2A;
  opacity: 1;
}

/* Footer siempre al pie */
footer {
  position: fixed;
  bottom: 60px; /* espacio reducido desde el borde inferior */
  width: 100%;
  text-align: center;
  font-size: clamp(10px, 1.1vw, 12px);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  opacity: 0.5;
  color: #BFC6CF;
}

/* Imagen de fondo */
.background-image {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100svh;
  z-index: 1;
  overflow: hidden;
  transform: translateY(100%);
  transition: transform 0.8s ease-out;
}

.background-image img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* ocupa toda la pantalla */
  object-position: center;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  h1 { font-size: clamp(50px, 12vw, 150px); }
  .subtitle { margin-top: 4vh; }
  .email-button { margin-top: 6vh; padding: 1vh 3vw; }
  footer { bottom: 50px; }
}

@media (max-width: 480px) {
  h1 { font-size: clamp(40px, 10vw, 100px); }
  .subtitle { margin-top: 3vh; letter-spacing: 0.2em; }
  .email-button { margin-top: 5vh; padding: 1vh 4vw; }
  footer { bottom: 40px; }
}
</style>
</head>
<body>

<div class="hero">
  <h1>GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.es" class="email-button">grapa@grapa.es</a>
</div>

<footer>&copy; 2025 GRAPA</footer>

<div class="background-image">
  <img src="images/grapas.jpg" alt="GRAPA">
</div>

<script>
const bg = document.querySelector('.background-image');

window.addEventListener('scroll', () => {
  const scrollY = window.scrollY;
  const vh = window.innerHeight;

  if (scrollY > vh * 0.1) {
    bg.style.transform = 'translateY(0)'; // imagen entra
  } else {
    bg.style.transform = 'translateY(100%)'; // imagen sale
  }
});
</script>

</body>
</html>
