<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* --- HERO --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding: 20vh 20px 0 20px; /* Padding para que el subtítulo no toque bordes */
}

h1.hero-text {
  font-size: clamp(45px, 15vw, 200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
  max-width: 100%;
}

.subtitle {
  margin-top:8vh;
  font-size: clamp(10px, 2.2vw, 20px);
  letter-spacing:0.35em;
  max-width: 80vw; /* Margen para el subtítulo */
  line-height: 1.5;
}

.email-button {
  margin-top:15vh;
  font-size:clamp(10px, 1.2vw, 14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:15px 30px;
}

/* --- FOOTER FIXED --- */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size: clamp(10px, 1vw, 12px);
  opacity:0.5;
  pointer-events: none;
  z-index: 10;
}

/* --- CONTENEDOR IMAGEN --- */
.background-image-container {
  position:relative;
  width: 100%;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* --- TEXTOS OVERLAY (ALINEADOS A LA G) --- */
.overlay-line {
  position:absolute;
  left:50%;
  /* Este transform centra el 'bloque', pero el texto dentro va a la izquierda */
  transform:translateX(-50%) translateY(20px);
  /* El ancho debe ser similar al de la palabra GRAPA para que parezca centrado */
  width: clamp(280px, 65vw, 1000px); 
  text-align: left; /* ALINEACIÓN A LA G */
  color:#E4E8ED;
  opacity:0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space:nowrap;
}

/* Tamaños Desktop */
.center { font-size: clamp(40px, 15vw, 200px); }
#museo { font-size: clamp(25px, 9.5vw, 110px); }
#fia-superior, #fia-inferior { font-size: clamp(35px, 12vw, 150px); }
#esceno { font-size: clamp(22px, 9vw, 100px); }

/* --- POSICIONES DESKTOP 1.0 --- */
#overlay-top { top: 25%; }
#museo { top: 21.5%; }
#fia-superior { top: 31.5%; }

#overlay-bottom { top: 75%; }
#esceno { top: 71.5%; }
#fia-inferior { top: 81.5%; }

/* --- AJUSTE MÓVIL: Evitar que se pisen --- */
@media (max-width: 600px) {
  .overlay-line { width: 85vw; } /* Más ancho en móvil */
  
  /* En móvil, aumentamos el espacio entre los tops para que no se pisen */
  #museo { top: 19%; }
  #overlay-top { top: 25%; }
  #fia-superior { top: 33%; }

  #esceno { top: 69%; }
  #overlay-bottom { top: 75%; }
  #fia-inferior { top: 83%; }
}

/* --- ANIMACIONES RITMO 1.0 --- */
.overlay-line span {
  display:inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

.shift .pa {
  transform: translateX(0.35em);
  transition-delay: 0.5s;
}

.fade-pa .pa { opacity:0; }

.recenter {
  /* Recenter original con el -8% */
  transform:translateX(-50%) translateY(0) translateX(-8%);
}

.visible {
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.delay-1 { transition-delay:0.1s; }
.delay-2 { transition-delay:0.4s; }
.delay-3 { transition-delay:0.7s; }

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">

  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line delay-2" id="museo">MU5EO</div>
  <div class="overlay-line delay-3" id="fia-superior">FIA</div>

  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line delay-3" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const sections = [
  ['overlay-top', 'museo', 'fia-superior'],
  ['overlay-bottom', 'esceno', 'fia-inferior']
];

sections.forEach(group => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const main = document.getElementById(group[0]); 
      const s1 = document.getElementById(group[1]);   
      const s2 = document.getElementById(group[2]);   

      if (entry.isIntersecting) {
        main.classList.add('visible', 'shift');
        s1.classList.add('visible');
        s2.classList.add('visible');

        setTimeout(() => {
          if (main.classList.contains('visible')) {
            main.classList.add('fade-pa', 'recenter');
            s1.classList.add('recenter');
            s2.classList.add('recenter');
          }
        }, 1200); 

      } else {
        [main, s1, s2].forEach(el => {
          el.classList.remove('visible', 'shift', 'fade-pa', 'recenter');
        });
      }
    });
  }, { threshold: 0.2 });

  observer.observe(document.getElementById(group[0]));
});
</script>

</body>
</html>
