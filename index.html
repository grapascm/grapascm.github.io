<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

/* Evita cualquier fuga lateral */
html, body {
  overflow-x: hidden;
  width: 100%;
  position: relative;
}

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  min-height: 300vh;
}

/* --- HERO CORREGIDO --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content: center; /* Centrado vertical más estable */
  text-align:center;
  padding: 0 20px; /* Margen de seguridad lateral */
}

h1.hero-text {
  /* Bajamos de 18vw a 14vw para que no desborde en iPhone SE/14 */
  font-size: clamp(40px, 14vw, 200px); 
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
  width: 100%;
}

.subtitle {
  margin-top:5vh;
  font-size:clamp(10px, 2.5vw, 18px);
  letter-spacing:0.3em;
  max-width: 80%; /* Evita que las líneas sean infinitas */
}

.email-button {
  margin-top:10vh;
  font-size:clamp(10px, 1.5vw, 14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding: 12px 24px;
}

/* --- OVERLAYS CORREGIDOS --- */
.background-image-container {
  position:relative;
  width: 100%;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

.overlay-line {
  position:absolute;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  /* Ajustamos el ancho para que el clamp no empuje hacia fuera */
  width: 90vw; 
  max-width: 1200px;
  color:#E4E8ED;
  opacity:0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space:nowrap;
}

.center {
  text-align:center;
  font-size:clamp(35px, 15vw, 200px);
}

.center span {
  display:inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

/* El movimiento lateral de la PA */
.shift .pa {
  transform: translateX(0.3em); /* Un pelín menos para no forzar el borde */
  transition-delay:0.5s;
}

.fade-pa .pa {
  opacity:0;
}

/* El recenter final (-8%) */
.recenter {
  transform:translateX(-50%) translateY(0) translateX(-8%);
}

.left-align {
  text-align:left;
  padding-left: 0.1em;
}

/* Ajuste fino de tamaños para móvil */
#museo { font-size:clamp(25px, 9.5vw, 110px); }
#esceno { font-size:clamp(22px, 9vw, 100px); }
#fia-superior, #fia-inferior { font-size:clamp(30px, 12vw, 150px); }

/* Mantener tus posiciones top originales */
#overlay-top { top:25%; }
#overlay-bottom { top:75%; }
#museo { top:21.5%; }
#fia-superior { top:31.5%; }
#esceno { top:71.5%; }
#fia-inferior { top:81.5%; }

.visible {
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.delay-1 { transition-delay:0.1s; }
.delay-2 { transition-delay:0.4s; }
.delay-3 { transition-delay:0.7s; }

footer {
  position:fixed;
  bottom:30px;
  width:100%;
  text-align:center;
  font-size: 10px;
  opacity:0.5;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">

  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
  <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>

  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const sections = [
  ['overlay-top', 'museo', 'fia-superior'],
  ['overlay-bottom', 'esceno', 'fia-inferior']
];

sections.forEach(group => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const main = document.getElementById(group[0]); 
      const s1 = document.getElementById(group[1]);   
      const s2 = document.getElementById(group[2]);   

      if (entry.isIntersecting) {
        main.classList.add('visible', 'shift');
        s1.classList.add('visible');
        s2.classList.add('visible');

        setTimeout(() => {
          if (main.classList.contains('visible')) {
            main.classList.add('fade-pa', 'recenter');
            s1.classList.add('recenter');
            s2.classList.add('recenter');
          }
        }, 1200);

      } else {
        main.classList.remove('visible', 'shift', 'fade-pa', 'recenter');
        s1.classList.remove('visible', 'recenter');
        s2.classList.remove('visible', 'recenter');
      }
    });
  }, { threshold: 0.2 }); // Umbral un poco más bajo para móviles

  observer.observe(document.getElementById(group[0]));
});
</script>

</body>
</html>
