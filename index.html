<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA 2.0 - Orden Corregido</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* --- HERO --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding: 20vh 20px 0 20px;
}

h1.hero-text {
  font-size: clamp(45px, 14vw, 200px);
  letter-spacing: 0.04em;
  margin-right: -0.04em; 
  color: #E4E8ED;
  line-height: 0.9;
}

.subtitle {
  margin-top: 8vh;
  font-size: clamp(10px, 2.2vw, 20px);
  letter-spacing: 0.35em;
  margin-right: -0.35em;
  max-width: 85vw;
}

.email-button {
  margin-top: 15vh;
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: 0.3em;
  margin-right: -0.3em;
  text-decoration: none;
  color: #E4E8ED;
  border: 1px solid rgba(228,232,237,0.2);
  padding: 15px 30px;
}

/* --- ESTRUCTURA --- */
.background-image-container {
  position: relative;
  width: 100%;
}

.background-image-container img {
  width: 100%;
  height: auto;
  display: block;
}

/* --- LÍNEAS DE TEXTO (GENERAL) --- */
.overlay-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  width: clamp(260px, 75vw, 1000px); 
  text-align: left;
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}

/* Tamaños y Posiciones */
.center { font-size: clamp(40px, 15vw, 200px); }
#museo { font-size: clamp(25px, 9.5vw, 110px); top: 21.5%; }
#overlay-top { top: 25%; z-index: 2; }
#fia-superior { font-size: clamp(35px, 12vw, 150px); top: 31.5%; }

#esceno { font-size: clamp(22px, 9vw, 100px); top: 71.5%; }
#overlay-bottom { top: 75%; z-index: 2; }
#fia-inferior { font-size: clamp(35px, 12vw, 150px); top: 81.5%; }

/* Animaciones */
.overlay-line span { display: inline-block; transition: transform 0.6s ease, opacity 0.4s ease; }
.shift .pa { transform: translateX(0.35em); transition-delay: 0.5s; }
.fade-pa .pa { opacity: 0 !important; visibility: hidden; }
.recenter { transform: translateX(-50%) translateY(0) translateX(-8%); }

/* Esta clase es la que dispara la aparición */
.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  #museo { top: 19%; }
  #fia-superior { top: 33%; }
  #esceno { top: 69%; }
  #fia-inferior { top: 83%; }
}

/* --- SECCIÓN 3: GRACIA5 --- */
.thanks-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translateX(-50%) translateY(-50%) translateY(20px);
  width: clamp(260px, 75vw, 1000px);
  text-align: left;
  font-size: clamp(25px, 9.5vw, 120px);
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}
.thanks-overlay span { display: inline-block; transition: all 0.6s ease; }
.extension-cia5 { opacity: 0; width: 0; overflow: hidden; position: absolute; }

.shift-3 .pa-3 { transform: translateX(0.35em); transition-delay: 0.5s; }
.fade-pa-3 .pa-3 { opacity: 0 !important; visibility: hidden; }
.recenter-3 { transform: translateX(-50%) translateY(-50%) translateX(-8%); }
.become-thanks .extension-cia5 { opacity: 1; width: auto; position: relative; }

/* --- FOOTER --- */
footer {
  width: 100%;
  text-align: center;
  padding: 80px 0;
  font-size: clamp(10px, 1vw, 12px);
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">
  
  <div class="overlay-line center" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="museo">MU5EO</div>
  <div class="overlay-line" id="fia-superior">FIA</div>

  <div class="overlay-line center" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="esceno">E5CENO</div>
  <div class="overlay-line" id="fia-inferior">FIA</div>
</div>

<div class="background-image-container" id="container-3">
  <img src="images/grapa2.jpg" alt="">
  <div class="thanks-overlay" id="thanks-group">
    <span class="gra-3">GRA</span><span class="extension-cia5">CIA5</span><span class="pa-3">PA</span>
  </div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
/* LÓGICA SECCIONES 1 Y 2 */
const sections = [['overlay-top', 'museo', 'fia-superior'], ['overlay-bottom', 'esceno', 'fia-inferior']];

sections.forEach(group => {
  const mainLine = document.getElementById(group[0]);
  const subLine1 = document.getElementById(group[1]);
  const subLine2 = document.getElementById(group[2]);

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        // 1. Aparece GRAPA
        mainLine.classList.add('visible');
        
        // 2. Se desplaza PA (después de 100ms de aparecer)
        setTimeout(() => mainLine.classList.add('shift'), 100);

        // 3. Aparecen MUSEO/ESCENO y FIA solo cuando PA se ha movido
        setTimeout(() => {
          if (mainLine.classList.contains('visible')) {
            subLine1.classList.add('visible');
            subLine2.classList.add('visible');
          }
        }, 700);

        // 4. Desaparece PA y recentra todo
        setTimeout(() => {
          if (mainLine.classList.contains('visible')) {
            mainLine.classList.add('fade-pa', 'recenter');
            subLine1.classList.add('recenter');
            subLine2.classList.add('recenter');
          }
        }, 1400);
      } else {
        // Reset
        [mainLine, subLine1, subLine2].forEach(el => {
          el.classList.remove('visible', 'shift', 'fade-pa', 'recenter');
        });
      }
    });
  }, { threshold: 0.2 });
  observer.observe(mainLine);
});

/* LÓGICA SECCIÓN 3: GRACIA5 */
const tg = document.getElementById('thanks-group');
const obs3 = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      tg.classList.add('visible');
      setTimeout(() => tg.classList.add('shift-3'), 100);
      
      setTimeout(() => {
        if (!tg.classList.contains('visible')) return;
        tg.classList.add('fade-pa-3', 'recenter-3');
        setTimeout(() => tg.classList.add('become-thanks'), 400);
      }, 1400);
    } else {
      tg.className = 'thanks-overlay';
    }
  });
}, { threshold: 0.4 });
obs3.observe(document.getElementById('container-3'));
</script>

</body>
</html>
