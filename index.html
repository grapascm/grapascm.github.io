<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  min-height: 300vh;
  overflow-x: hidden;
}

/* HERO */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* Footer */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}

/* Imagen */
.background-image-container {
  position:relative;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* BLOQUE COMPLETO */
.section-group {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:clamp(300px,70vw,1200px);
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  padding-left:0.09em;
  opacity:0;
  transition: opacity 0.6s ease, padding-left 0.6s ease;
  pointer-events:none;
}

/* cuando el bloque se recentra */
.section-group.centered {
  align-items:center;
  padding-left:0;
}

/* línea base */
.line {
  color:#E4E8ED;
  white-space:nowrap;
  transition: opacity 0.6s ease, transform 0.6s ease, margin-left 0.6s ease;
}

/* línea principal GRA/PA */
.gra-line {
  width:100%;
  text-align:center;
  font-size:clamp(100px,15vw,200px);
  line-height:0.9;
  opacity:1;
  transform:translateY(0);
}

/* sublíneas */
.sub-line {
  font-size:clamp(55px,9.5vw,110px);
  line-height:0.9;
  opacity:0;
  transform:translateY(16px);
  text-align:left;
  margin-left:0.09em;
}

.fia-line {
  font-size:clamp(55px,9.5vw,110px);
  line-height:0.9;
  opacity:0;
  transform:translateY(16px);
  text-align:left;
  margin-left:0.09em;
}

/* aparecen las sublíneas */
.section-group.show-sub .sub-line,
.section-group.show-sub .fia-line {
  opacity:1;
  transform:translateY(0);
}

/* PA se desplaza */
.section-group.open .pa {
  transform:translateX(0.35em);
  transition-delay:0.4s;
}

/* PA desaparece */
.section-group.fade-pa .pa {
  opacity:0;
}

/* al recentrar, el conjunto entero se centra */
.section-group.centered .sub-line,
.section-group.centered .fia-line {
  text-align:center;
  margin-left:0;
}

/* posiciones */
#top-group { top:25%; }
#bottom-group { top:75%; }

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="GRAPA">

  <!-- BLOQUE SUPERIOR -->
  <div class="section-group" id="top-group">
    <div class="line gra-line">
      <span class="gra">GRA</span><span class="pa">PA</span>
    </div>
    <div class="line sub-line" id="museo">MU5EO</div>
    <div class="line fia-line" id="fia-superior">FIA</div>
  </div>

  <!-- BLOQUE INFERIOR -->
  <div class="section-group" id="bottom-group">
    <div class="line gra-line">
      <span class="gra">GRA</span><span class="pa">PA</span>
    </div>
    <div class="line sub-line" id="esceno">E5CENO</div>
    <div class="line fia-line" id="fia-inferior">FIA</div>
  </div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const groups = [
  {
    wrapper: document.getElementById('top-group'),
  },
  {
    wrapper: document.getElementById('bottom-group'),
  }
];

const timersMap = new Map();

function clearGroupTimers(wrapper) {
  const timers = timersMap.get(wrapper) || [];
  timers.forEach(t => clearTimeout(t));
  timersMap.delete(wrapper);
}

function resetGroup(wrapper) {
  wrapper.classList.remove('show-sub', 'open', 'fade-pa', 'centered');
  clearGroupTimers(wrapper);
}

function runGroupSequence(wrapper) {
  clearGroupTimers(wrapper);

  const t1 = setTimeout(() => {
    wrapper.classList.add('show-sub');
  }, 350);

  const t2 = setTimeout(() => {
    wrapper.classList.add('open');
  }, 750);

  const t3 = setTimeout(() => {
    wrapper.classList.add('fade-pa', 'centered');
  }, 1150);

  timersMap.set(wrapper, [t1, t2, t3]);
}

groups.forEach(({ wrapper }) => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        wrapper.classList.add('visible');
        runGroupSequence(wrapper);
      } else {
        resetGroup(wrapper);
      }
    });
  }, {
    threshold: 0.3
  });

  observer.observe(wrapper);
});
</script>

</body>
</html>
