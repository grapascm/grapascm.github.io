<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
  min-height: 300vh;
}

/* HERO */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* Footer */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}

/* Imagen */
.background-image-container {
  position:relative;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* BASE TEXTO */
.overlay-line {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:clamp(300px,70vw,1200px);
  color:#E4E8ED;
  opacity:0;
  transition: opacity 0.5s ease, transform 0.5s ease;
  white-space:nowrap;
  transform: translateX(-50%) translateY(20px);
}

/* GRAPA */
.center {
  text-align:center;
  font-size:clamp(100px,15vw,200px);
}

/* alineados con G */
.left-align {
  text-align:left;
  padding-left:0.09em;
}

/* tamaños */
#museo { font-size:clamp(55px,9.5vw,110px); }
#esceno { font-size:clamp(50px,9vw,100px); }
#fia-superior, #fia-inferior { font-size:clamp(70px,12vw,150px); }

/* posiciones */
#overlay-top { top:25%; }
#overlay-bottom { top:75%; }

#museo { top:21.5%; }
#fia-superior { top:31.5%; }

#esceno { top:71.5%; }
#fia-inferior { top:81.5%; }

/* Clases activas para fade-in en cascada */
.visible {
  opacity:1;
  transform: translateX(-50%) translateY(0);
}

/* Retraso específico para cascada */
.delay-1 { transition-delay: 0.1s; }
.delay-2 { transition-delay: 0.2s; }
.delay-3 { transition-delay: 0.3s; }
.delay-4 { transition-delay: 0.4s; }

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg">

  <!-- GRAPA superior -->
  <div class="overlay-line center delay-1" id="overlay-top">GRAPA</div>
  <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
  <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>

  <!-- GRAPA inferior -->
  <div class="overlay-line center delay-1" id="overlay-bottom">GRAPA</div>
  <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const elements = [
  { el: document.getElementById('overlay-top'), group: 'top' },
  { el: document.getElementById('museo'), group: 'top' },
  { el: document.getElementById('fia-superior'), group: 'top' },
  { el: document.getElementById('overlay-bottom'), group: 'bottom' },
  { el: document.getElementById('esceno'), group: 'bottom' },
  { el: document.getElementById('fia-inferior'), group: 'bottom' }
];

const bg = document.querySelector('.background-image-container');
const vh = window.innerHeight;

function checkVisibility() {
  const y = window.scrollY;
  const top = bg.offsetTop;
  const h = bg.offsetHeight;

  const showTop = (y >= top - vh/2 && y < top + h/2 - vh);
  const showBottom = (y >= top + h/2 - vh/2);

  elements.forEach((item, i) => {
    if(item.group === 'top') {
      if(showTop) item.el.classList.add('visible');
      else item.el.classList.remove('visible');
    } else {
      if(showBottom) item.el.classList.add('visible');
      else item.el.classList.remove('visible');
    }
  });
}

window.addEventListener('scroll', checkVisibility);
window.addEventListener('load', checkVisibility);
</script>

</body>
</html>
