<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* --- HERO --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding: 20vh 20px 0 20px; /* Añadido margen lateral */
}

h1.hero-text {
  font-size: clamp(50px, 14vw, 200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size: clamp(10px, 3vw, 18px); /* Ajustado para móvil */
  letter-spacing:0.35em;
  max-width: 90%;
  line-height: 1.4;
}

.email-button {
  margin-top:10vh;
  font-size:clamp(10px, 1.2vw, 14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding: 15px 30px;
}

/* --- FOOTER --- */
footer {
  position:fixed;
  bottom:40px;
  width:100%;
  text-align:center;
  font-size: 10px;
  opacity:0.5;
  pointer-events: none;
  z-index: 10;
}

/* --- CONTENEDOR IMAGEN --- */
.background-image-container {
  position:relative;
  width: 100%;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* --- EL TRUCO: CONTENEDORES DE BLOQUE --- */
/* Esto evita que las letras se pisen porque el bloque es una unidad */
.text-group {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0;
  transition: opacity 0.8s ease, transform 0.8s ease;
  pointer-events: none;
}

.text-group.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Posiciones de los bloques */
.group-top { top: 25%; }
.group-bottom { top: 75%; }

/* Estilos de línea dentro del grupo */
.line {
  width: clamp(300px, 90vw, 1200px);
  white-space: nowrap;
  color: #E4E8ED;
}

.line.grapa-main {
  font-size: clamp(45px, 15vw, 180px);
  text-align: center;
}

.line.sub-text {
  text-align: left;
  padding-left: 3vw; /* Ajuste fino para la alineación */
  margin-bottom: -0.2em; /* Control de espacio vertical */
  margin-top: -0.2em;
}

#museo, #esceno { font-size: clamp(25px, 9vw, 100px); }
#fia-1, #fia-2 { font-size: clamp(35px, 12vw, 140px); }

/* --- ANIMACIONES --- */
.grapa-main span {
  display: inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

.shift .pa { transform: translateX(0.35em); transition-delay: 0.4s; }
.fade-pa .pa { opacity: 0; }

/* El desplazamiento lateral del bloque entero */
.recenter {
  transform: translateX(-50%) translateX(-8%);
}

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">

  <div class="text-group group-top" id="group-1">
    <div class="line sub-text" id="museo">MU5EO</div>
    <div class="line grapa-main">
      <span class="gra">GRA</span><span class="pa">PA</span>
    </div>
    <div class="line sub-text" id="fia-1">FIA</div>
  </div>

  <div class="text-group group-bottom" id="group-2">
    <div class="line sub-text" id="esceno">E5CENO</div>
    <div class="line grapa-main">
      <span class="gra">GRA</span><span class="pa">PA</span>
    </div>
    <div class="line sub-text" id="fia-2">FIA</div>
  </div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const groups = document.querySelectorAll('.text-group');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const el = entry.target;
    
    if (entry.isIntersecting) {
      // Inicia aparición y desplazamiento de "PA"
      el.classList.add('visible', 'shift');

      // Animación final de centrado y desaparición
      setTimeout(() => {
        if (el.classList.contains('visible')) {
          el.classList.add('fade-pa', 'recenter');
        }
      }, 1200);

    } else {
      // Reset total
      el.classList.remove('visible', 'shift', 'fade-pa', 'recenter');
    }
  });
}, { threshold: 0.3 });

groups.forEach(g => observer.observe(g));
</script>

</body>
</html>
