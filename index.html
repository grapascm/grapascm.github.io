<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('/fonts/GRAPA.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh; /* Cambiamos height por min-height */
  font-family: 'GRAPA', sans-serif;
  background-color: #0A1A2A;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #BFC6CF;
  padding: 16px; /* Añadimos padding para que no quede pegado en móvil */
}

.container {
  padding: 20px 16px; /* Reducimos padding en móvil */
  text-transform: uppercase;
  width: 100%; /* Aseguramos que ocupe todo el ancho */
  max-width: 1200px; /* Pero con un máximo en pantallas grandes */
  margin: 0 auto;
}

h1 {
  font-size: 20vw; /* Cambiamos a vw para móvil */
  letter-spacing: 0.04em;
  color: #E4E8ED;
  line-height: 1; /* Evita cortes en móvil */
  word-break: break-word; /* Por si acaso */
}

/* Media query para pantallas más grandes */
@media (min-width: 768px) {
  .container {
    padding: 40px;
  }
  
  h1 {
    font-size: clamp(80px, 15vw, 200px); /* Volvemos a clamp en desktop */
  }
}

.subtitle {
  margin-top: 8px; /* Reducimos margen en móvil */
  font-size: clamp(12px, 3.5vw, 20px); /* Ajustamos para mejor lectura en móvil */
  letter-spacing: 0.2em; /* Reducimos letter-spacing en móvil */
  line-height: 1.4;
  word-break: break-word;
}

@media (min-width: 768px) {
  .subtitle {
    margin-top: 10px;
    letter-spacing: 0.35em; /* Recuperamos el espaciado original en desktop */
  }
}

.email {
  margin-top: 40px; /* Reducimos margen en móvil */
  font-size: clamp(16px, 5vw, 26px); /* Ajustamos para móvil */
  letter-spacing: 0.08em; /* Reducimos para móvil */
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap; /* Permite que si es muy largo, salte de línea */
  gap: 4px;
}

@media (min-width: 768px) {
  .email {
    margin-top: 60px;
    letter-spacing: 0.12em;
  }
}

.cta {
  margin-top: 25px;
  font-size: clamp(14px, 4vw, 20px); /* Ajustamos para móvil */
  letter-spacing: 0.2em; /* Reducimos para móvil */
  cursor: pointer;
  transition: opacity 0.3s ease;
  padding: 12px 20px; /* Añadimos área táctil más grande para móvil */
  display: inline-block; /* Para que el padding funcione bien */
}

@media (min-width: 768px) {
  .cta {
    margin-top: 25px;
    letter-spacing: 0.4em;
    padding: 0; /* Quitamos padding extra en desktop */
  }
}

.cta:hover {
  opacity: 0.6;
}

a {
  text-decoration: none;
  color: inherit;
  display: inline-block; /* Mejora el área táctil */
  width: 100%; /* En móvil, que ocupe todo el ancho para facilitar el click */
}

@media (min-width: 768px) {
  a {
    width: auto; /* Vuelve a auto en desktop */
  }
}

/* Estilos para la @ de grapas - Versión mejorada */
.grapa-at {
  display: inline-flex; /* Cambiamos a flex para mejor control */
  align-items: center;
  justify-content: center;
  position: relative;
  width: 1.2em;
  height: 1.2em;
  color: transparent;
  font-family: sans-serif;
  font-weight: 100;
  -webkit-text-stroke: 0.02em #BFC6CF;
  text-stroke: 0.02em #BFC6CF;
  transform: scale(1.1);
  margin: 0 0.05em;
  vertical-align: middle; /* Mejor alineación */
}

/* Versión móvil más pequeña */
@media (max-width: 480px) {
  .grapa-at {
    transform: scale(0.9); /* Un poco más pequeña en móvil */
  }
}

.grapa-at::before,
.grapa-at::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  background: transparent;
  pointer-events: none; /* Evita que interfiera con clicks */
}

/* Grape superior */
.grapa-at::before {
  top: 0;
  left: 0;
  box-shadow: 
    0.2em 0.15em 0 0 #BFC6CF,   /* Superior derecha */
    -0.2em 0.15em 0 0 #BFC6CF;  /* Superior izquierda */
}

/* Grapas inferiores */
.grapa-at::after {
  bottom: 0;
  left: 0;
  box-shadow: 
    0.2em -0.15em 0 0 #BFC6CF,  /* Inferior derecha */
    -0.2em -0.15em 0 0 #BFC6CF; /* Inferior izquierda */
}

/* Ajustamos las grapas para que se vean bien en todos los tamaños */
.grapa-at::before,
.grapa-at::after {
  content: '';
  position: absolute;
  width: 0.15em;
  height: 0.15em;
  background-color: #BFC6CF;
  border-radius: 1px; /* Un mínimo radio para que no sean tan cuadradas */
}

.grapa-at::before {
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  box-shadow: 
    0.3em 0 0 0 #BFC6CF,
    -0.3em 0 0 0 #BFC6CF;
}

.grapa-at::after {
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%);
  box-shadow: 
    0.3em 0 0 0 #BFC6CF,
    -0.3em 0 0 0 #BFC6CF;
}

/* Ajustes específicos para móvil muy pequeño */
@media (max-width: 360px) {
  h1 {
    font-size: 18vw; /* Un poco más pequeño */
  }
  
  .subtitle {
    font-size: 3vw;
    letter-spacing: 0.15em;
  }
  
  .email {
    font-size: 4.5vw;
    flex-direction: column; /* Apila la @ y el texto en móvil muy pequeño */
    gap: 8px;
  }
  
  .cta {
    font-size: 3.8vw;
    letter-spacing: 0.15em;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <div class="email">
    <span class="grapa-at">@</span>
    <span>grapa.e5</span>
  </div>
  <div class="cta">
    <a href="mailto:grapa@grapa.es">Contactar Ya</a>
  </div>
</div>

</body>
</html>
