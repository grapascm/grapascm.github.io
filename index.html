<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body { overflow-x: hidden; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
}

/* HERO */
.hero {
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding-top: 20vh;
  padding-left: 8vw;
  padding-right: 8vw;
}

h1.hero-text {
  font-size: clamp(40px, 13vw, 200px);
  letter-spacing: 0.04em;
  color: #E4E8ED;
  line-height: 0.9;
}

.subtitle {
  margin-top: 8vh;
  font-size: clamp(9px, 1.6vw, 20px);
  letter-spacing: 0.2em;
}

.email-button {
  margin-top: 18vh;
  font-size: clamp(8px, 1vw, 14px);
  letter-spacing: 0.2em;
  text-decoration: none;
  color: #E4E8ED;
  border: 1px solid rgba(228,232,237,0.2);
  padding: 1vh 2vw;
}

footer {
  position: fixed;
  bottom: 60px;
  width: 100%;
  text-align: center;
  font-size: clamp(8px, 1vw, 12px);
  opacity: 0.5;
  pointer-events: none;
}

/* CONTENEDOR IMAGEN */
.background-image-container {
  position: relative;
  width: 100%;
  aspect-ratio: 11191 / 22281;
}

.background-image-container img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ── WRAPPERS DE GRUPO ────────────────────
   Cada grupo (superior / inferior) vive en
   un wrapper absoluto que ocupa toda la anchura.
   El wrapper se desplaza con translateX para
   centrar el bloque suavemente.
──────────────────────────────────────── */
.group-wrapper {
  position: absolute;
  left: 0;
  width: 100%;
  transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
}

#group-top    { top: 0; }
#group-bottom { top: 0; }

/* ── OVERLAY LINE ─────────────────────────
   Dentro del wrapper, cada línea se posiciona
   con top:% relativo al contenedor imagen
   (que sigue siendo el padre con position:relative).
   left y transform centran el texto horizontalmente.
──────────────────────────────────────── */
.overlay-line {
  position: absolute;
  color: #E4E8ED;
  opacity: 0;
  white-space: nowrap;
}

/* GRAPA se centra con CSS */
.center {
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  text-align: center;
  font-size: clamp(80px, 15vw, 200px);
}

.center span {
  display: inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

.shift .pa {
  transform: translateX(0.35em);
  transition-delay: 0.5s;
}

.fade-pa .pa {
  opacity: 0;
}

/* Alineación izquierda */
.left-align {
  text-align: left;
}

/* Tamaños — vw puro */
#museo          { font-size: clamp(55px, 9.5vw, 110px); }
#esceno         { font-size: clamp(50px, 9vw,   100px); }
#fia-superior,
#fia-inferior   { font-size: clamp(70px, 12vw,  150px); }

/* Posiciones absolutas relativas al contenedor imagen */
#overlay-top    { top: 25%;   }
#overlay-bottom { top: 75%;   }
#museo          { top: 21.5%; }
#fia-superior   { top: 31.5%; }
#esceno         { top: 71.5%; }
#fia-inferior   { top: 81.5%; }

.center.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.delay-1 { transition-delay: 0.1s; }
.delay-2 { transition-delay: 0.4s; }
.delay-3 { transition-delay: 0.7s; }
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container" id="img-container">
  <img src="images/grapas.jpg" alt="">

  <!-- SUPERIOR -->
  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
  <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>

  <!-- INFERIOR -->
  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const sections = [
  {
    triggerId: 'overlay-top',
    grapaId:   'overlay-top',
    ids:       ['overlay-top', 'museo', 'fia-superior'],
    sideIds:   ['museo', 'fia-superior']
  },
  {
    triggerId: 'overlay-bottom',
    grapaId:   'overlay-bottom',
    ids:       ['overlay-bottom', 'esceno', 'fia-inferior'],
    sideIds:   ['esceno', 'fia-inferior']
  }
];

// Posiciona MU5EO y FIA alineados con el borde izquierdo de la G,
// sin transición (posición inicial antes de aparecer).
function alignToG(section) {
  const container  = document.getElementById('img-container');
  const cw         = container.offsetWidth;
  const graEl      = document.getElementById(section.grapaId);
  const graW       = graEl.getBoundingClientRect().width; // GRAPA completo
  // Borde izquierdo de GRAPA centrado: cw/2 - graW/2
  const graLeft    = cw / 2 - graW / 2;

  section.sideIds.forEach(id => {
    const el = document.getElementById(id);
    // Quitamos left:50% translateX(-50%) y ponemos left absoluto
    el.style.transition = 'none';
    el.style.left       = graLeft + 'px';
    el.style.transform  = 'translateY(20px)'; // estado inicial (pre-visible)
  });
}

// Centra el bloque entero (GRA + MU5EO + FIA) suavemente.
// El más ancho marca el ancho del bloque; lo centramos en el contenedor.
function centerBlock(section) {
  const container = document.getElementById('img-container');
  const cw        = container.offsetWidth;

  // Medimos el ancho real de cada elemento
  const widths = section.ids.map(id =>
    document.getElementById(id).getBoundingClientRect().width
  );
  const blockW = Math.max(...widths);
  // Left edge para centrar el bloque
  const blockLeft = (cw - blockW) / 2;

  section.ids.forEach(id => {
    const el = document.getElementById(id);
    const w  = el.getBoundingClientRect().width;
    el.style.transition = 'left 0.9s cubic-bezier(0.4, 0, 0.2, 1), transform 0.9s cubic-bezier(0.4, 0, 0.2, 1)';
    el.style.left       = blockLeft + 'px';
    el.style.transform  = 'translateY(0)';
  });
}

sections.forEach(section => {
  // Alineamos a la G antes de que sean visibles
  alignToG(section);

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {

      if (entry.isIntersecting) {

        // 1. Aparecen todos en su posición inicial (alineados a la G)
        section.ids.forEach(id => {
          const el = document.getElementById(id);
          el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
          el.style.transform  = 'translateY(0)';
          el.style.opacity    = '1';
        });

        // 2. PA se desplaza
        setTimeout(() => {
          document.getElementById(section.grapaId).classList.add('shift');

          // 3. PA desaparece + bloque se centra suavemente
          setTimeout(() => {
            document.getElementById(section.grapaId).classList.add('fade-pa');
            // Pequeña pausa para que fade-pa arranque antes de mover
            setTimeout(() => centerBlock(section), 80);
          }, 400);

        }, 400);

      } else {
        // Reset completo
        section.ids.forEach(id => {
          const el = document.getElementById(id);
          el.classList.remove('shift', 'fade-pa');
          el.style.transition = 'none';
          el.style.opacity    = '0';
          el.style.transform  = 'translateY(20px)';
        });
        // Volvemos a alinear a la G para la próxima vez
        setTimeout(() => alignToG(section), 50);
      }
    });
  }, { threshold: 0.3 });

  observer.observe(document.getElementById(section.triggerId));
});

// Recalcular posiciones si cambia el tamaño de ventana
window.addEventListener('resize', () => {
  sections.forEach(section => alignToG(section));
});
</script>

</body>
</html>
