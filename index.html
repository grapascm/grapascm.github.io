<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
  min-height: 300vh;
}

/* HERO */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* Footer */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}

/* Imagen */
.background-image-container {
  position:relative;
}

.background-image-container img {
  width:100%;
  height:auto;
}

/* GRUPOS */
.group {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:clamp(300px,70vw,1200px);
  transition: transform 0.5s;
}

/* TEXTOS */
.overlay-line {
  position:relative;
  color:#E4E8ED;
  opacity:0;
  transition:0.5s;
  white-space:nowrap;
  display:block;
}

/* GRAPA */
.gra { font-size:clamp(100px,15vw,200px); }
.pa { font-size:clamp(100px,15vw,200px); display:inline-block; transition: transform 0.5s, opacity 0.5s; }

/* alineados con G */
.left-align { font-size:clamp(50px,9vw,100px); margin-left:0.08em; }

/* posiciones */
#group-top { top:25%; }
#group-bottom { top:75%; }

/* textos superiores */
#museo { margin-top:-10px; }
#fia-superior { margin-top:5px; }

/* textos inferiores */
#esceno { margin-top:-10px; }
#fia-inferior { margin-top:5px; }

/* responsive */
@media(max-width:768px){
  .gra,.pa { font-size:clamp(60px,12vw,150px); }
  .left-align { font-size:clamp(40px,10vw,90px); }
}
@media(max-width:480px){
  .gra,.pa { font-size:clamp(50px,10vw,120px); }
  .left-align { font-size:clamp(30px,8vw,80px); }
}
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg">

  <!-- GRUPOS SUPERIOR -->
  <div class="group" id="group-top">
    <div class="overlay-line">
      <span class="gra">GRA</span><span class="pa">PA</span>
    </div>
    <div class="overlay-line left-align" id="museo">MU5EO</div>
    <div class="overlay-line left-align" id="fia-superior">FIA</div>
  </div>

  <!-- GRUPOS INFERIOR -->
  <div class="group" id="group-bottom">
    <div class="overlay-line">
      <span class="gra">GRA</span><span class="pa">PA</span>
    </div>
    <div class="overlay-line left-align" id="esceno">E5CENO</div>
    <div class="overlay-line left-align" id="fia-inferior">FIA</div>
  </div>

</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const topGroup = document.getElementById('group-top')
const bottomGroup = document.getElementById('group-bottom')

const topPA = topGroup.querySelector('.pa')
const bottomPA = bottomGroup.querySelector('.pa')

const topLines = topGroup.querySelectorAll('.overlay-line')
const bottomLines = bottomGroup.querySelectorAll('.overlay-line')

const bg = document.querySelector('.background-image-container')
const vh = window.innerHeight

window.addEventListener('scroll',()=>{
  const y = window.scrollY
  const topOffset = bg.offsetTop
  const h = bg.offsetHeight

  // SUPERIOR
  if(y >= topOffset - vh/2 && y < topOffset + h/2 - vh/4){
    topLines.forEach(el=>el.style.opacity = 1)

    // PA se mueve a la derecha
    topPA.style.transform = 'translateX(25%)'
    // Tras desplazamiento PA, desaparecer y centrar el grupo
    setTimeout(()=>{
      topPA.style.opacity = 0
      topGroup.querySelectorAll('.left-align, .gra').forEach(el=>{
        el.style.textAlign = 'center'
        el.style.marginLeft = '0'
      })
      topGroup.style.transform = 'translateX(-50%)'
    }, 500)
  }

  // INFERIOR
  if(y >= topOffset + h/2 - vh/2){
    bottomLines.forEach(el=>el.style.opacity = 1)

    bottomPA.style.transform = 'translateX(25%)'
    setTimeout(()=>{
      bottomPA.style.opacity = 0
      bottomGroup.querySelectorAll('.left-align, .gra').forEach(el=>{
        el.style.textAlign = 'center'
        el.style.marginLeft = '0'
      })
      bottomGroup.style.transform = 'translateX(-50%)'
    },500)
  }
})
</script>

</body>
</html>
