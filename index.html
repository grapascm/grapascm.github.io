<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color:#BFC6CF;
  overflow-x: hidden;
  min-height: 300vh;
}

/* HERO */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* Footer */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}

/* Imagen */
.background-image-container {
  position:relative;
}

.background-image-container img {
  width:100%;
  height:auto;
}

/* TEXTOS */
.overlay-line {
  position:absolute;
  color:#E4E8ED;
  opacity:0;
  transition:0.5s, transform 0.7s ease;
  white-space:nowrap;
}

/* GRAPA */
.center { text-align:center; font-size:clamp(100px,15vw,200px); }
.gra { display:inline-block; }
.pa { display:inline-block; }

/* alineados con G */
.left-align { text-align:left; padding-left:0.09em; }

/* tamaños */
#museo { font-size:clamp(55px,9.5vw,110px); }
#esceno { font-size:clamp(50px,9vw,100px); }
#fia-superior,#fia-inferior { font-size:clamp(70px,12vw,150px); }

/* posiciones */
#overlay-top { top:25%; left:50%; transform:translateX(-50%); }
#overlay-bottom { top:75%; left:50%; transform:translateX(-50%); }

#museo { top:21.5%; }
#fia-superior { top:31.5%; }
#esceno { top:71.5%; }
#fia-inferior { top:81.5%; }

/* centrar conjunto */
.recenter { left:50% !important; transform:translateX(-50%) !important; }

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg">

  <!-- GRAPA dividido en GRA + PA -->
  <div class="overlay-line center" id="overlay-top"><span class="gra">GRA</span><span class="pa">PA</span></div>
  <div class="overlay-line center" id="overlay-bottom"><span class="gra">GRA</span><span class="pa">PA</span></div>

  <!-- MUSEOGRAFIA -->
  <div class="overlay-line left-align" id="museo">MU5EO</div>
  <div class="overlay-line left-align" id="fia-superior">FIA</div>

  <!-- ESCENOGRAFIA -->
  <div class="overlay-line left-align" id="esceno">E5CENO</div>
  <div class="overlay-line left-align" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const elsTop = {
  overlay: document.getElementById('overlay-top'),
  gra: document.querySelector('#overlay-top .gra'),
  pa: document.querySelector('#overlay-top .pa'),
  museo: document.getElementById('museo'),
  fia: document.getElementById('fia-superior')
};
const elsBottom = {
  overlay: document.getElementById('overlay-bottom'),
  gra: document.querySelector('#overlay-bottom .gra'),
  pa: document.querySelector('#overlay-bottom .pa'),
  esceno: document.getElementById('esceno'),
  fia: document.getElementById('fia-inferior')
};

const bg = document.querySelector('.background-image-container');
const vh = window.innerHeight;

window.addEventListener('scroll',()=>{
  const y = window.scrollY;
  const top = bg.offsetTop;
  const h = bg.offsetHeight;

  // PROGRESO SUPERIOR
  const topStart = top - vh/2;
  const topEnd = top + h/2 - vh/4;
  let progressTop = (y - topStart) / (topEnd - topStart);
  progressTop = Math.min(Math.max(progressTop,0),1);

  // PROGRESO INFERIOR
  const bottomStart = top + h/2 - vh/2;
  const bottomEnd = top + h - vh/4;
  let progressBottom = (y - bottomStart) / (bottomEnd - bottomStart);
  progressBottom = Math.min(Math.max(progressBottom,0),1);

  // --------------------------
  // SUPERIOR
  // GRAPA aparece primero
  elsTop.overlay.style.opacity = progressTop>0 ? 1:0;
  // MUSEO y FIA aparecen después de GRAPA
  elsTop.museo.style.opacity = progressTop>0.1 ? 1:0;
  elsTop.fia.style.opacity = progressTop>0.1 ? 1:0;

  // PA se separa a la derecha y desaparece
  const paShift = 30; // px
  const paStart = 0.3;
  const paEnd = 0.6;
  if(progressTop>=paStart){
    const local = Math.min((progressTop-paStart)/(paEnd-paStart),1);
    elsTop.pa.style.transform = `translateX(${local*paShift}px)`;
    elsTop.pa.style.opacity = 1 - local;
  } else {
    elsTop.pa.style.transform = 'translateX(0)';
    elsTop.pa.style.opacity = 1;
  }

  // Cuando PA desaparece, centrar conjunto GRA+MUSEO+FIA
  if(progressTop>=paEnd){
    elsTop.overlay.classList.add('recenter');
    elsTop.museo.classList.add('recenter');
    elsTop.fia.classList.add('recenter');
  } else {
    elsTop.overlay.classList.remove('recenter');
    elsTop.museo.classList.remove('recenter');
    elsTop.fia.classList.remove('recenter');
  }

  // --------------------------
  // INFERIOR
  elsBottom.overlay.style.opacity = progressBottom>0 ? 1:0;
  elsBottom.esceno.style.opacity = progressBottom>0.1 ? 1:0;
  elsBottom.fia.style.opacity = progressBottom>0.1 ? 1:0;

  if(progressBottom>=paStart){
    const local = Math.min((progressBottom-paStart)/(paEnd-paStart),1);
    elsBottom.pa.style.transform = `translateX(${local*paShift}px)`;
    elsBottom.pa.style.opacity = 1 - local;
  } else {
    elsBottom.pa.style.transform = 'translateX(0)';
    elsBottom.pa.style.opacity = 1;
  }

  if(progressBottom>=paEnd){
    elsBottom.overlay.classList.add('recenter');
    elsBottom.esceno.classList.add('recenter');
    elsBottom.fia.classList.add('recenter');
  } else {
    elsBottom.overlay.classList.remove('recenter');
    elsBottom.esceno.classList.remove('recenter');
    elsBottom.fia.classList.remove('recenter');
  }

});
</script>

</body>
</html>
