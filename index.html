<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  overflow-x: hidden;
}

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  min-height: 300vh;
}

/* HERO ORIGINAL */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

/* FIX: Bajamos el mínimo de 80px a 40px y ajustamos el vw */
h1.hero-text {
  font-size: clamp(40px, 18vw, 200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(10px, 2vw, 20px);
  letter-spacing:0.35em;
  padding: 0 5vw; /* Añadido un pequeño padding para que no toque los bordes en móvil */
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* FOOTER ORIGINAL */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
  pointer-events: none;
}

/* CONTENEDOR IMAGEN */
.background-image-container {
  position:relative;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* BASE TEXTO */
/* FIX: Bajamos el mínimo de 300px a 250px y ajustamos el vw base */
.overlay-line {
  position:absolute;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  width:clamp(250px, 75vw, 1200px);
  color:#E4E8ED;
  opacity:0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space:nowrap;
}

/* GRAPA */
/* FIX: Bajamos el mínimo de 100px a 35px */
.center {
  text-align:center;
  font-size:clamp(35px, 15vw, 200px);
}

.center span {
  display:inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

/* PA Movimiento */
.shift .pa {
  transform: translateX(0.35em);
  transition-delay:0.5s;
}

/* PA Desaparece */
.fade-pa .pa {
  opacity:0;
}

/* RECENTER GLOBAL ORIGINAL (-8%) */
.recenter {
  transform:translateX(-50%) translateY(0) translateX(-8%);
}

/* ALINEACIÓN IZQUIERDA */
.left-align {
  text-align:left;
  padding-left:0.09em;
}

/* TAMAÑOS: Reducimos los mínimos drásticamente para que el VW mande en móviles */
#museo { font-size:clamp(25px, 9.5vw, 110px); }
#esceno { font-size:clamp(22px, 9vw, 100px); }
#fia-superior, #fia-inferior { font-size:clamp(30px, 12vw, 150px); }

/* POSICIONES ORIGINALES */
#overlay-top { top:25%; }
#overlay-bottom { top:75%; }
#museo { top:21.5%; }
#fia-superior { top:31.5%; }
#esceno { top:71.5%; }
#fia-inferior { top:81.5%; }

/* ESTADO VISIBLE */
.visible {
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* DELAYS DE APARICIÓN */
.delay-1 { transition-delay:0.1s; }
.delay-2 { transition-delay:0.4s; }
.delay-3 { transition-delay:0.7s; }

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">

  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
  <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>

  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const sections = [
  ['overlay-top', 'museo', 'fia-superior'],
  ['overlay-bottom', 'esceno', 'fia-inferior']
];

sections.forEach(group => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const main = document.getElementById(group[0]); 
      const s1 = document.getElementById(group[1]);   
      const s2 = document.getElementById(group[2]);   

      if (entry.isIntersecting) {
        main.classList.add('visible', 'shift');
        s1.classList.add('visible');
        s2.classList.add('visible');

        setTimeout(() => {
          if (main.classList.contains('visible')) {
            main.classList.add('fade-pa', 'recenter');
            s1.classList.add('recenter');
            s2.classList.add('recenter');
          }
        }, 1200);

      } else {
        main.classList.remove('visible', 'shift', 'fade-pa', 'recenter');
        s1.classList.remove('visible', 'recenter');
        s2.classList.remove('visible', 'recenter');
      }
    });
  }, { threshold: 0.3 });

  observer.observe(document.getElementById(group[0]));
});
</script>

</body>
</html>
