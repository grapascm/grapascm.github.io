<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

/* Reset y base */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
  min-height: 300vh;
}

/* HERO */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:0 5vw;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* Footer */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}

/* Imagen contenedor */
.background-image-container {
  position:relative;
  width:100%;
  max-width:2000px;
  margin:0 auto;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* BASE TEXTO */
.overlay-line {
  position:absolute;
  left:0;
  right:0;
  margin:0 auto;
  width:clamp(300px,70%,1200px);
  color:#E4E8ED;
  opacity:0;
  transition:0.5s;
  white-space:nowrap;
}

/* GRAPA */
.center {
  text-align:center;
  font-size:clamp(100px,15vw,200px);
}

/* alineados con G */
.left-align {
  text-align:left;
  padding-left:0.09em;
}

/* tamaños específicos */
#museo { font-size:clamp(55px,9.5vw,110px); }
#esceno { font-size:clamp(50px,9vw,100px); }
#fia-superior, #fia-inferior { font-size:clamp(70px,12vw,150px); }

/* posiciones */
#overlay-top { top:25%; }
#overlay-bottom { top:75%; }
#museo { top:21.5%; }
#fia-superior { top:31.5%; }
#esceno { top:71.5%; }
#fia-inferior { top:81.5%; }

/* ANIMACIONES ADICIONALES */
.recenter .gra,
.recenter .mu,
.recenter .fi {
  left:50%;
  transform:translateX(-50%);
  transition: all 0.8s ease-in-out;
}

/* Responsive */
@media(max-width:768px){
  h1.hero-text { font-size:clamp(50px,12vw,150px); }
  .subtitle { margin-top:6vh; }
  .email-button { margin-top:14vh; padding:1vh 3vw; }
  #overlay-top, #overlay-bottom { font-size:clamp(80px,12vw,150px); }
  #museo, #esceno, #fia-superior, #fia-inferior { font-size:clamp(40px,10vw,90px); }
  footer { bottom:50px; }
}

@media(max-width:480px){
  h1.hero-text { font-size:clamp(40px,10vw,100px); }
  .subtitle { margin-top:4vh; letter-spacing:0.2em; }
  .email-button { margin-top:10vh; padding:1vh 4vw; }
  #overlay-top, #overlay-bottom { font-size:clamp(60px,12vw,120px); }
  #museo, #esceno, #fia-superior, #fia-inferior { font-size:clamp(30px,10vw,80px); }
  footer { bottom:40px; }
}
</style>
</head>
<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="GRAPA">

  <!-- GRAPA -->
  <div class="overlay-line center gra" id="overlay-top">GRAPA</div>
  <div class="overlay-line center gra" id="overlay-bottom">GRAPA</div>

  <!-- MUSEOGRAFIA -->
  <div class="overlay-line left-align mu" id="museo">MU5EO</div>
  <div class="overlay-line left-align fi" id="fia-superior">FIA</div>

  <!-- ESCENOGRAFIA -->
  <div class="overlay-line left-align mu" id="esceno">E5CENO</div>
  <div class="overlay-line left-align fi" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const ids = ['overlay-top','overlay-bottom','museo','fia-superior','esceno','fia-inferior']
const els = ids.map(id=>document.getElementById(id))
const bg = document.querySelector('.background-image-container')
const vh = window.innerHeight

window.addEventListener('scroll',()=>{
  const y = window.scrollY
  const top = bg.offsetTop
  const h = bg.offsetHeight

  // Mostrar GRAPA y luego MUSEO/FIA
  const showTop = (y >= top - vh/2 && y < top + h/2 - vh)
  const showBottom = (y >= top + h/2 - vh/2)

  // Mitad superior
  els[0].style.opacity = showTop ? 1:0
  els[2].style.opacity = showTop ? 1:0
  els[3].style.opacity = showTop ? 1:0

  // Mitad inferior
  els[1].style.opacity = showBottom ? 1:0
  els[4].style.opacity = showBottom ? 1:0
  els[5].style.opacity = showBottom ? 1:0

  // Desplazamiento PA y recenter
  if(showTop){
    els[0].style.transform = "translateX(-40%)"
    setTimeout(()=>document.querySelector('.background-image-container').classList.add('recenter'),400)
  } else {
    els[0].style.transform = "translateX(-50%)"
    document.querySelector('.background-image-container').classList.remove('recenter')
  }

  if(showBottom){
    els[1].style.transform = "translateX(-40%)"
    setTimeout(()=>document.querySelector('.background-image-container').classList.add('recenter'),400)
  } else {
    els[1].style.transform = "translateX(-50%)"
  }
})
</script>

</body>
</html>
