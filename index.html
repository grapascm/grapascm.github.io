<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  min-height: 300vh;
}

/* HERO */
.hero {
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding-top: 20vh;
}

h1.hero-text {
  font-size: clamp(80px, 15vw, 200px);
  letter-spacing: 0.04em;
  color: #E4E8ED;
  line-height: 0.9;
}

.subtitle {
  margin-top: 8vh;
  font-size: clamp(14px, 2vw, 20px);
  letter-spacing: 0.35em;
}

.email-button {
  margin-top: 18vh;
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: 0.3em;
  text-decoration: none;
  color: #E4E8ED;
  border: 1px solid rgba(228,232,237,0.2);
  padding: 1vh 2vw;
}

/* Footer */
footer {
  position: fixed;
  bottom: 60px;
  width: 100%;
  text-align: center;
  font-size: clamp(10px, 1vw, 12px);
  opacity: 0.5;
}

/* CONTENEDOR DE IMAGEN */
.background-image-container {
  position: relative;
  width: 100%;
  aspect-ratio: 11191 / 22281;
}

.background-image-container img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* BASE TEXTO */
.overlay-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  width: 90%;
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}

/* GRAPA */
.center {
  text-align: center;
  font-size: 15vw;
}

.center span {
  display: inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

/* PA movimiento */
.shift .pa {
  transform: translateX(0.35em);
  transition-delay: 0.5s;
}

/* PA desaparece */
.fade-pa .pa {
  opacity: 0;
}

/* RECENTER GLOBAL */
.recenter {
  transform: translateX(-50%) translateY(0) translateX(-8%);
}

/* alineacion izquierda */
.left-align {
  text-align: left;
  padding-left: 0.09em;
}

/* tamanos desktop */
#museo          { font-size: 9.5vw; }
#esceno         { font-size: 9vw; }
#fia-superior,
#fia-inferior   { font-size: 12vw; }

/* posiciones — iguales en todos los dispositivos */
#overlay-top    { top: 25%; }
#overlay-bottom { top: 75%; }
#museo          { top: 21.5%; }
#fia-superior   { top: 31.5%; }
#esceno         { top: 71.5%; }
#fia-inferior   { top: 81.5%; }

/* visible */
.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* delays */
.delay-1 { transition-delay: 0.1s; }
.delay-2 { transition-delay: 0.4s; }
.delay-3 { transition-delay: 0.7s; }


/* ─── MÓVIL ─────────────────────────────
   En pantallas estrechas reducimos fuentes
   con vw puro — así escalan con el ancho
   igual que la imagen.
──────────────────────────────────────── */
@media (max-width: 600px) {

  .hero {
    padding-top: 15vh;
  }

  h1.hero-text {
    font-size: 22vw;
  }

  .subtitle {
    font-size: 3.5vw;
    letter-spacing: 0.2em;
  }

  .email-button {
    font-size: 3vw;
    padding: 2vw 4vw;
    letter-spacing: 0.15em;
  }

  /* Overlay: permitir wrap y ancho completo */
  .overlay-line {
    width: 92%;
    white-space: nowrap; /* mantenemos nowrap, controlamos tamaño con vw */
  }

  .center         { font-size: 18vw; }
  #museo          { font-size: 11vw; }
  #esceno         { font-size: 10.5vw; }
  #fia-superior,
  #fia-inferior   { font-size: 14vw; }

  footer {
    font-size: 2.5vw;
    bottom: 20px;
  }
}
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrilena</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">

  <!-- SUPERIOR -->
  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
  <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>

  <!-- INFERIOR -->
  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const sections = [
  ['overlay-top',    'museo',  'fia-superior'],
  ['overlay-bottom', 'esceno', 'fia-inferior']
];

sections.forEach(group => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      group.forEach(id => {
        const el = document.getElementById(id);

        if (entry.isIntersecting) {
          el.classList.add('visible');

          if (id === 'museo') {
            setTimeout(() => {
              const top = document.getElementById('overlay-top');
              top.classList.add('shift');
              setTimeout(() => {
                top.classList.add('fade-pa', 'recenter');
                document.getElementById('museo').classList.add('recenter');
                document.getElementById('fia-superior').classList.add('recenter');
              }, 400);
            }, 400);
          }

          if (id === 'esceno') {
            setTimeout(() => {
              const bottom = document.getElementById('overlay-bottom');
              bottom.classList.add('shift');
              setTimeout(() => {
                bottom.classList.add('fade-pa', 'recenter');
                document.getElementById('esceno').classList.add('recenter');
                document.getElementById('fia-inferior').classList.add('recenter');
              }, 400);
            }, 400);
          }

        } else {
          el.classList.remove('visible');

          if (id === 'museo') {
            const top = document.getElementById('overlay-top');
            top.classList.remove('shift', 'fade-pa', 'recenter');
            document.getElementById('museo').classList.remove('recenter');
            document.getElementById('fia-superior').classList.remove('recenter');
          }

          if (id === 'esceno') {
            const bottom = document.getElementById('overlay-bottom');
            bottom.classList.remove('shift', 'fade-pa', 'recenter');
            document.getElementById('esceno').classList.remove('recenter');
            document.getElementById('fia-inferior').classList.remove('recenter');
          }
        }
      });
    });
  }, { threshold: 0.3 });

  observer.observe(document.getElementById(group[0]));
});
</script>

</body>
</html>
