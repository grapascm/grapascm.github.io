<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'GRAPA',sans-serif;
  text-transform:uppercase;
  background:#0A1A2A;
  color:#E4E8ED;
  overflow-x:hidden;
}

/* ================= HERO ================= */

.hero{
  min-height:100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:20vh;
  text-align:center;
}

.hero h1{
  font-size:clamp(80px,15vw,200px);
  line-height:0.9;
}

.subtitle{
  margin-top:8vh;
  letter-spacing:0.35em;
}

.email{
  margin-top:18vh;
  border:1px solid rgba(255,255,255,0.2);
  padding:1vh 2vw;
  text-decoration:none;
  color:white;
}

/* ================= IMAGEN ================= */

.bg{
  position:relative;
  width:100%;
}

.bg img{
  width:100%;
  height:auto;
  display:block;
}

/* ================= OVERLAYS ================= */

.overlay{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:clamp(300px,70vw,1200px);
  opacity:0;
  transition:opacity 0.6s ease;
  pointer-events:none;
}

/* GRAPA */
.grapa{
  text-align:center;
  font-size:clamp(100px,15vw,200px);
}

/* BLOQUES IZQUIERDA */
.left{
  text-align:left;
  padding-left:0.08em;
}

/* tamaños */
.museo{ font-size:clamp(55px,9.5vw,110px); }
.esceno{ font-size:clamp(50px,9vw,100px); }
.fia{ font-size:clamp(65px,11vw,140px); }

/* posiciones (desktop base) */
#grapa-top{ top:25%; }
#grapa-bottom{ top:75%; }

#museo{ top:21.5%; }
#fia-top{ top:31.5%; }

#esceno{ top:71.5%; }
#fia-bottom{ top:81.5%; }

/* ================= MOBILE FIX REAL ================= */

@media(max-width:768px){

  .hero{
    padding-top:15vh;
  }

  .hero h1{
    font-size:clamp(60px,18vw,120px);
  }

  .subtitle{
    margin-top:6vh;
  }

  .email{
    margin-top:12vh;
    padding:1vh 4vw;
  }

  /* clave: imagen ocupa bien pantalla */
  .bg img{
    height:200vh; /* asegura recorrido */
    object-fit:cover;
  }

  /* overlays más legibles */
  .overlay{
    width:85vw;
  }

  .grapa{
    font-size:clamp(70px,18vw,130px);
  }

  .museo,.esceno{
    font-size:clamp(45px,12vw,90px);
  }

  .fia{
    font-size:clamp(50px,14vw,100px);
  }

}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email">grapa@grapa.e5</a>
</div>

<!-- IMAGEN -->
<div class="bg">
  <img src="images/grapas.jpg">

  <!-- GRAPA -->
  <div class="overlay grapa" id="grapa-top">GRAPA</div>
  <div class="overlay grapa" id="grapa-bottom">GRAPA</div>

  <!-- MUSEO -->
  <div class="overlay left museo" id="museo">MU5EO</div>
  <div class="overlay left fia" id="fia-top">FIA</div>

  <!-- ESCENO -->
  <div class="overlay left esceno" id="esceno">E5CENO</div>
  <div class="overlay left fia" id="fia-bottom">FIA</div>

</div>

<script>
const el = id => document.getElementById(id)

const grapaTop = el('grapa-top')
const grapaBottom = el('grapa-bottom')
const museo = el('museo')
const fiaTop = el('fia-top')
const esceno = el('esceno')
const fiaBottom = el('fia-bottom')

const bg = document.querySelector('.bg')

window.addEventListener('scroll',()=>{

  const y = window.scrollY
  const vh = window.innerHeight
  const top = bg.offsetTop
  const h = bg.offsetHeight

  /* -------- SUPERIOR -------- */

  const showTop = (y >= top - vh/2 && y < top + h/2 - vh)

  grapaTop.style.opacity = showTop ? 1 : 0

  // delay natural
  setTimeout(()=>{
    museo.style.opacity = showTop ? 1 : 0
    fiaTop.style.opacity = showTop ? 1 : 0
  },150)

  /* -------- INFERIOR -------- */

  const showBottom = (y >= top + h/2 - vh/2)

  grapaBottom.style.opacity = showBottom ? 1 : 0

  setTimeout(()=>{
    esceno.style.opacity = showBottom ? 1 : 0
    fiaBottom.style.opacity = showBottom ? 1 : 0
  },150)

})
</script>

</body>
</html>
