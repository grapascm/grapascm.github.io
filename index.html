<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color:#BFC6CF;
  min-height:300vh;
}

/* HERO */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* Footer */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}

/* Imagen */
.background-image-container {
  position:relative;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* Contenedor de cada bloque */
.block {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  transition: transform 0.6s ease;
}

/* Cuando se centra todo */
.block.recenter {
  left:50%;
  transform:translateX(-50%);
}

/* BASE TEXTO */
.overlay-line {
  color:#E4E8ED;
  white-space:nowrap;
  opacity:0;
  transition:opacity 0.6s ease, transform 0.6s ease;
}

/* GRAPA */
.center {
  text-align:center;
  font-size:clamp(100px,15vw,200px);
}

.center span {
  display:inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

/* PA movimiento */
.shift .pa {
  transform: translateX(0.35em);
  transition-delay:0.5s;
}

/* PA desaparece */
.fade-pa .pa {
  opacity:0;
}

/* alineación izquierda */
.left-align {
  text-align:left;
  padding-left:0.09em;
}

/* tamaños */
#museo { font-size:clamp(55px,9.5vw,110px); }
#esceno { font-size:clamp(50px,9vw,100px); }
#fia-superior, #fia-inferior { font-size:clamp(70px,12vw,150px); }

/* posiciones */
#block-top { top:25%; }
#block-bottom { top:75%; }

#museo { margin-top:-3%; }
#fia-superior { margin-top:2%; }

#esceno { margin-top:-3%; }
#fia-inferior { margin-top:2%; }

/* visible */
.visible {
  opacity:1;
  transform:translateX(0) translateY(0);
}
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg">

  <!-- BLOQUE SUPERIOR -->
  <div class="block" id="block-top">
    <div class="overlay-line center" id="overlay-top">
      <span class="gra">GRA</span><span class="pa">PA</span>
    </div>
    <div class="overlay-line left-align" id="museo">MU5EO</div>
    <div class="overlay-line left-align" id="fia-superior">FIA</div>
  </div>

  <!-- BLOQUE INFERIOR -->
  <div class="block" id="block-bottom">
    <div class="overlay-line center" id="overlay-bottom">
      <span class="gra">GRA</span><span class="pa">PA</span>
    </div>
    <div class="overlay-line left-align" id="esceno">E5CENO</div>
    <div class="overlay-line left-align" id="fia-inferior">FIA</div>
  </div>

</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const topBlock = document.getElementById('block-top');
const bottomBlock = document.getElementById('block-bottom');

// Observers para cada bloque
const observerTop = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      topBlock.querySelectorAll('.overlay-line').forEach(el=>el.classList.add('visible'));
      // Animación PA y recenter
      const pa = topBlock.querySelector('.pa');
      pa.classList.add('shift');
      setTimeout(()=>{
        pa.classList.add('fade-pa');
        topBlock.classList.add('recenter');
      },400);
    } else {
      topBlock.querySelectorAll('.overlay-line').forEach(el=>el.classList.remove('visible'));
      const pa = topBlock.querySelector('.pa');
      pa.classList.remove('shift','fade-pa');
      topBlock.classList.remove('recenter');
    }
  });
},{threshold:0.3});

const observerBottom = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      bottomBlock.querySelectorAll('.overlay-line').forEach(el=>el.classList.add('visible'));
      const pa = bottomBlock.querySelector('.pa');
      pa.classList.add('shift');
      setTimeout(()=>{
        pa.classList.add('fade-pa');
        bottomBlock.classList.add('recenter');
      },400);
    } else {
      bottomBlock.querySelectorAll('.overlay-line').forEach(el=>el.classList.remove('visible'));
      const pa = bottomBlock.querySelector('.pa');
      pa.classList.remove('shift','fade-pa');
      bottomBlock.classList.remove('recenter');
    }
  });
},{threshold:0.3});

observerTop.observe(document.getElementById('overlay-top'));
observerBottom.observe(document.getElementById('overlay-bottom'));
</script>

</body>
</html>
