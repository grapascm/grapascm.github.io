<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body { overflow-x: hidden; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
}

/* HERO */
.hero {
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding-top: 20vh;
  padding-left: 8vw;
  padding-right: 8vw;
}

h1.hero-text {
  font-size: clamp(40px, 13vw, 200px);
  letter-spacing: 0.04em;
  color: #E4E8ED;
  line-height: 0.9;
}

.subtitle {
  margin-top: 8vh;
  font-size: clamp(9px, 1.6vw, 20px);
  letter-spacing: 0.2em;
}

.email-button {
  margin-top: 18vh;
  font-size: clamp(8px, 1vw, 14px);
  letter-spacing: 0.2em;
  text-decoration: none;
  color: #E4E8ED;
  border: 1px solid rgba(228,232,237,0.2);
  padding: 1vh 2vw;
}

footer {
  position: fixed;
  bottom: 60px;
  width: 100%;
  text-align: center;
  font-size: clamp(8px, 1vw, 12px);
  opacity: 0.5;
  pointer-events: none;
}

/* CONTENEDOR IMAGEN */
.background-image-container {
  position: relative;
  width: 100%;
  aspect-ratio: 11191 / 22281;
}

.background-image-container img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ── WRAPPERS DE GRUPO ────────────────────
   Cada grupo (superior / inferior) vive en
   un wrapper absoluto que ocupa toda la anchura.
   El wrapper se desplaza con translateX para
   centrar el bloque suavemente.
──────────────────────────────────────── */
.group-wrapper {
  position: absolute;
  left: 0;
  width: 100%;
  transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
}

#group-top    { top: 0; }
#group-bottom { top: 0; }

/* ── OVERLAY LINE ─────────────────────────
   Dentro del wrapper, cada línea se posiciona
   con top:% relativo al contenedor imagen
   (que sigue siendo el padre con position:relative).
   left y transform centran el texto horizontalmente.
──────────────────────────────────────── */
.overlay-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}

/* GRAPA */
.center {
  text-align: center;
  font-size: clamp(80px, 15vw, 200px);
}

.center span {
  display: inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

.shift .pa {
  transform: translateX(0.35em);
  transition-delay: 0.5s;
}

.fade-pa .pa {
  opacity: 0;
}

/* Alineación izquierda */
.left-align {
  text-align: left;
}

/* Tamaños — vw puro */
#museo          { font-size: clamp(55px, 9.5vw, 110px); }
#esceno         { font-size: clamp(50px, 9vw,   100px); }
#fia-superior,
#fia-inferior   { font-size: clamp(70px, 12vw,  150px); }

/* Posiciones absolutas relativas al contenedor imagen */
#overlay-top    { top: 25%;   }
#overlay-bottom { top: 75%;   }
#museo          { top: 21.5%; }
#fia-superior   { top: 31.5%; }
#esceno         { top: 71.5%; }
#fia-inferior   { top: 81.5%; }

.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.delay-1 { transition-delay: 0.1s; }
.delay-2 { transition-delay: 0.4s; }
.delay-3 { transition-delay: 0.7s; }
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container" id="img-container">
  <img src="images/grapas.jpg" alt="">

  <!-- SUPERIOR -->
  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
  <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>

  <!-- INFERIOR -->
  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const sections = [
  {
    triggerId:  'overlay-top',
    grapaId:    'overlay-top',
    ids:        ['overlay-top', 'museo', 'fia-superior'],
    shiftIds:   ['museo', 'fia-superior']
  },
  {
    triggerId:  'overlay-bottom',
    grapaId:    'overlay-bottom',
    ids:        ['overlay-bottom', 'esceno', 'fia-inferior'],
    shiftIds:   ['esceno', 'fia-inferior']
  }
];

// Devuelve cuánto hay que desplazar el grupo para centrarlo.
// Mide el elemento más ancho del conjunto y calcula el offset
// necesario para que ese bloque quede centrado en el contenedor.
function calcCenterOffset(ids) {
  const container = document.getElementById('img-container');
  const cw = container.offsetWidth;

  // Ancho real de cada texto (sin el translateX del left:50%)
  const maxW = Math.max(...ids.map(id => {
    const el = document.getElementById(id);
    return el.getBoundingClientRect().width;
  }));

  // Con left:50% + translateX(-50%), el centro del elemento
  // ya está en el centro del contenedor.
  // Lo que queremos es que el borde izquierdo del bloque más ancho
  // quede alineado con la G de GRAPA, es decir, en el mismo left.
  // En la estado inicial left:50% translateX(-50%) ya centra cada línea.
  // Tras el recenter queremos que el conjunto comparta el mismo left edge.
  // El left edge de cada elemento centrado es: cw/2 - width/2
  // Para alinearlos todos al left edge del más ancho:
  // offset = 0 (ya están centrados individualmente, solo igualamos el left)
  // En realidad solo necesitamos mover el bloque 0 — cada línea ya tiene left:50%.
  // El truco: forzamos el left de museo y fia al mismo valor que GRA tiene
  // después de que PA desaparece, que es left:50% - graWidth/2.

  const graEl = document.getElementById(ids[0]);
  const graW  = graEl.querySelector('.gra') 
                ? graEl.querySelector('.gra').getBoundingClientRect().width 
                : graEl.getBoundingClientRect().width;

  // Queremos que el left edge de museo y fia sea: cw/2 - graW/2
  // Su posición actual (centrados): left edge = cw/2 - propioAncho/2
  // Offset necesario para museo: (cw/2 - graW/2) - (cw/2 - museoW/2) = (museoW - graW) / 2
  return ids.slice(1).map(id => {
    const el = document.getElementById(id);
    const w  = el.getBoundingClientRect().width;
    return (w - graW) / 2;
  });
}

sections.forEach(section => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {

      if (entry.isIntersecting) {
        // 1. Aparecen todos
        section.ids.forEach(id =>
          document.getElementById(id).classList.add('visible')
        );

        // 2. PA se desplaza
        setTimeout(() => {
          const grapa = document.getElementById(section.grapaId);
          grapa.classList.add('shift');

          // 3. PA desaparece y el bloque se centra suavemente
          setTimeout(() => {
            grapa.classList.add('fade-pa');

            // Calculamos el offset para alinear museo/fia con la G
            const offsets = calcCenterOffset(section.ids);

            section.shiftIds.forEach((id, i) => {
              const el = document.getElementById(id);
              // Movemos hacia la izquierda para alinear al borde de GRA
              el.style.transform = `translateX(calc(-50% + ${offsets[i]}px)) translateY(0)`;
              el.style.transition = 'transform 0.9s cubic-bezier(0.4, 0, 0.2, 1)';
            });

          }, 400);
        }, 400);

      } else {
        section.ids.forEach(id => {
          const el = document.getElementById(id);
          el.classList.remove('visible', 'shift', 'fade-pa');
          el.style.transform = '';
          el.style.transition = '';
        });
      }
    });
  }, { threshold: 0.3 });

  observer.observe(document.getElementById(section.triggerId));
});
</script>

</body>
</html>
