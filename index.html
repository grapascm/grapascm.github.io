<script>
// Agrupamos cada bloque en arrays
const topBlock = [
  document.getElementById('overlay-top'),
  document.getElementById('museo'),
  document.getElementById('fia-superior')
];

const bottomBlock = [
  document.getElementById('overlay-bottom'),
  document.getElementById('esceno'),
  document.getElementById('fia-inferior')
];

// Función para centrar un bloque
function centerBlock(block) {
  block.forEach(el => {
    el.style.left = '50%';
    el.style.transform = 'translateX(-50%) translateY(0)';
  });
}

// Función para resetear bloque
function resetBlock(block) {
  block.forEach(el => {
    el.style.left = '';
    el.style.transform = '';
  });
}

// Observadores de scroll para controlar la animación
const observerTop = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      // Después de un delay (PA desaparece) centramos todo el bloque
      setTimeout(() => centerBlock(topBlock), 500);
    } else {
      resetBlock(topBlock);
    }
  });
},{threshold: 0.3});

const observerBottom = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      setTimeout(() => centerBlock(bottomBlock), 500);
    } else {
      resetBlock(bottomBlock);
    }
  });
},{threshold: 0.3});

// Observamos solo el texto MUSEO y ESCENO
observerTop.observe(document.getElementById('museo'));
observerBottom.observe(document.getElementById('esceno'));
</script>
