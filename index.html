<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* --- HERO --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(55px, 15vw, 200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

/* --- FOOTER FIXED --- */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
  pointer-events: none;
  z-index: 10;
}

/* --- CONTENEDOR IMAGEN --- */
.background-image-container {
  position:relative;
  width: 100%;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* --- TEXTOS ANIMADOS (BASE) --- */
.overlay-line {
  position:absolute;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  width:clamp(280px, 85vw, 1200px);
  color:#E4E8ED;
  opacity:0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space:nowrap;
}

.center {
  text-align:center;
  font-size:clamp(50px, 15vw, 200px);
}

.center span {
  display:inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

/* ANIMACIONES */
.shift .pa { transform: translateX(0.35em); transition-delay: 0.5s; }
.fade-pa .pa { opacity:0; }
.recenter { transform:translateX(-50%) translateY(0) translateX(-8%); }
.left-align { text-align:left; padding-left:0.09em; }

.visible { opacity:1; transform:translateX(-50%) translateY(0); }
.delay-1 { transition-delay:0.1s; }
.delay-2 { transition-delay:0.4s; }
.delay-3 { transition-delay:0.7s; }

/* --- POSICIONES DESKTOP (TU 1.0) --- */
#overlay-top { top:25%; }
#museo { font-size:clamp(30px, 9.5vw, 110px); top:21.5%; }
#fia-superior { font-size:clamp(40px, 12vw, 150px); top:31.5%; }

#overlay-bottom { top:75%; }
#esceno { font-size:clamp(28px, 9vw, 100px); top:71.5%; }
#fia-inferior { font-size:clamp(40px, 12vw, 150px); top:81.5%; }


/* --- AJUSTES ESPECÍFICOS PARA MÓVIL --- */
@media (max-width: 600px) {
  h1.hero-text {
    font-size: 12vw; /* Más margen lateral en el header */
  }

  /* Compactamos los grupos para que no se pisen entre sí */
  /* GRUPO 1 */
  #museo { top: 22%; font-size: 8.5vw; }
  #overlay-top { top: 25%; }
  #fia-superior { top: 30.5%; font-size: 11vw; }

  /* GRUPO 2 */
  #esceno { top: 72%; font-size: 8vw; }
  #overlay-bottom { top: 75%; }
  #fia-inferior { top: 80.5%; font-size: 11vw; }
}

.subtitle { margin-top:8vh; font-size:clamp(12px, 2vw, 20px); letter-spacing:0.35em; }
.email-button { margin-top:18vh; font-size:clamp(10px, 1.2vw, 14px); letter-spacing:0.3em; text-decoration:none; color:#E4E8ED; border:1px solid rgba(228,232,237,0.2); padding:1vh 2vw; }

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">

  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
  <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>

  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const sections = [
  { main: 'overlay-top', extras: ['museo', 'fia-superior'] },
  { main: 'overlay-bottom', extras: ['esceno', 'fia-inferior'] }
];

sections.forEach(group => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const main = document.getElementById(group.main);
      const s1 = document.getElementById(group.extras[0]);
      const s2 = document.getElementById(group.extras[1]);

      if (entry.isIntersecting) {
        main.classList.add('visible', 'shift');
        s1.classList.add('visible');
        s2.classList.add('visible');

        setTimeout(() => {
          if (main.classList.contains('visible')) {
            main.classList.add('fade-pa', 'recenter');
            s1.classList.add('recenter');
            s2.classList.add('recenter');
          }
        }, 1100); 

      } else {
        [main, s1, s2].forEach(el => {
          el.classList.remove('visible', 'shift', 'fade-pa', 'recenter');
        });
      }
    });
  }, { threshold: 0.2 });

  observer.observe(document.getElementById(group.main));
});
</script>

</body>
</html>
