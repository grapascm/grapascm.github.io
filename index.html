<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA - Movimiento Corregido</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* --- HERO --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding: 20vh 20px 0 20px;
}

.hero-text {
  font-size: clamp(45px, 14vw, 200px);
  letter-spacing: 0.04em;
  margin-right: -0.04em; 
  color: #E4E8ED;
  line-height: 0.9;
}

.subtitle {
  margin-top: 8vh;
  font-size: clamp(10px, 2.2vw, 20px);
  letter-spacing: 0.35em;
  margin-right: -0.35em;
  max-width: 85vw;
}

.email-button {
  margin-top: 15vh;
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: 0.3em;
  margin-right: -0.3em;
  text-decoration: none;
  color: #E4E8ED;
  border: 1px solid rgba(228,232,237,0.2);
  padding: 15px 30px;
}

/* --- FOOTER ORIGINAL --- */
footer {
  position: fixed;
  bottom: 60px;
  width: 100%;
  text-align: center;
  font-size: clamp(10px, 1vw, 12px);
  opacity: 0.5;
  pointer-events: none;
  z-index: 10;
}

/* --- SECCIONES --- */
.background-image-container {
  position: relative;
  width: 100%;
}

.background-image-container img {
  width: 100%;
  height: auto;
  display: block;
}

/* --- TEXTOS SOBRE IMAGEN --- */
.overlay-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  width: clamp(260px, 75vw, 1000px); 
  text-align: left;
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}

.center { font-size: clamp(40px, 15vw, 200px); }
#museo { font-size: clamp(25px, 9.5vw, 110px); top: 21.5%; }
#overlay-top { top: 25%; }
#fia-superior { font-size: clamp(35px, 12vw, 150px); top: 31.5%; }

#esceno { font-size: clamp(22px, 9vw, 100px); top: 71.5%; }
#overlay-bottom { top: 75%; }
#fia-inferior { font-size: clamp(35px, 12vw, 150px); top: 81.5%; }

/* --- SECCIÓN 3: GRACIA5 --- */
#thanks-text { 
  font-size: clamp(25px, 9.5vw, 110px); 
  top: 50%; 
  transform: translateX(-50%) translateY(-50%) translateY(20px);
  display: flex;
  justify-content: flex-start; /* Mantiene la palabra anclada a la izquierda del bloque */
  min-width: 1.5em; /* Evita que el contenedor colapse */
}

/* --- ANIMACIONES --- */
.overlay-line span { display: inline-block; transition: transform 0.6s ease, opacity 0.4s ease, width 0.6s ease; }

.shift .pa { transform: translateX(0.35em); transition-delay: 0.5s; }

/* Eliminamos el ancho de la PA para que no deje hueco al irse */
.fade-pa .pa { opacity: 0 !important; visibility: hidden; width: 0; } 

/* Recentrado para Secciones 1 y 2 */
.recenter { transform: translateX(-50%) translateY(0) translateX(-8%); }

/* Recentrado para Sección 3: Ajustado para que GRACIA5 se vea centrado */
.recenter-final { transform: translateX(-50%) translateY(-50%) translateX(-14%) !important; }

.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
.visible-final { opacity: 1; transform: translateX(-50%) translateY(-50%); }

.extension-cia5 {
  opacity: 0;
  width: 0;
  overflow: hidden;
  transition: all 0.6s ease;
}

.show-cia5 .extension-cia5 {
  opacity: 1;
  width: auto;
}

@media (max-width: 600px) {
  #museo { top: 19%; }
  #fia-superior { top: 33%; }
  #esceno { top: 69%; }
  #fia-inferior { top: 83%; }
}
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">
  
  <div class="overlay-line center" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="museo">MU5EO</div>
  <div class="overlay-line" id="fia-superior">FIA</div>

  <div class="overlay-line center" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="esceno">E5CENO</div>
  <div class="overlay-line" id="fia-inferior">FIA</div>
</div>

<div class="background-image-container">
  <img src="images/grapa2.jpg" alt="">
  <div class="overlay-line" id="thanks-text">
    <span class="gra">GRA</span><span class="extension-cia5">CIA5</span><span class="pa">PA</span>
  </div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const config = [
  { main: 'overlay-top', extras: ['museo', 'fia-superior'], type: 'normal' },
  { main: 'overlay-bottom', extras: ['esceno', 'fia-inferior'], type: 'normal' },
  { main: 'thanks-text', extras: [], type: 'final' }
];

config.forEach(group => {
  const mainEl = document.getElementById(group.main);
  const extraEls = group.extras.map(id => document.getElementById(id));

  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        mainEl.classList.add(group.type === 'final' ? 'visible-final' : 'visible');

        setTimeout(() => {
          if (mainEl.classList.contains('visible') || mainEl.classList.contains('visible-final')) {
            mainEl.classList.add('shift');
            extraEls.forEach(el => el.classList.add('visible'));
          }
        }, 100); 

        setTimeout(() => {
          if (mainEl.classList.contains('visible') || mainEl.classList.contains('visible-final')) {
            mainEl.classList.add('fade-pa');
            mainEl.classList.add(group.type === 'final' ? 'recenter-final' : 'recenter');
            extraEls.forEach(el => el.classList.add('recenter'));

            if(group.type === 'final') {
                setTimeout(() => mainEl.classList.add('show-cia5'), 300);
            }
          }
        }, 1200);
      } else {
        mainEl.classList.remove('visible', 'visible-final', 'shift', 'fade-pa', 'recenter', 'recenter-final', 'show-cia5');
        extraEls.forEach(el => el.classList.remove('visible', 'recenter'));
      }
    });
  }, { threshold: 0.1 });
  obs.observe(mainEl);
});
</script>

</body>
</html>
