<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { overflow-x: hidden; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
}

/* HERO */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* CONTENEDOR DE IMAGEN */
.background-image-container {
  position:relative;
  width:100%;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* BASE TEXTO */
.overlay-line {
  position:absolute;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  width:clamp(300px,70vw,1200px);
  color:#E4E8ED;
  opacity:0;
  /* Transición suave para posición y opacidad */
  transition: opacity 0.6s ease, transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  white-space:nowrap;
}

.center {
  text-align:center;
  font-size:clamp(100px,15vw,200px);
}

.center span {
  display:inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

/* PASO 2: SHIFT PA */
.shift .pa {
  transform: translateX(0.35em);
}

/* PASO 3: FADE PA */
.fade-pa .pa {
  opacity:0;
}

.left-align {
  text-align:left;
}

/* POSICIONES ORIGINALES */
#museo          { font-size:clamp(55px,9.5vw,110px); top:21.5%; }
#fia-superior   { font-size:clamp(70px,12vw,150px); top:31.5%; }
#overlay-top    { top:25%; }

#esceno         { font-size:clamp(50px,9vw,100px); top:71.5%; }
#fia-inferior   { font-size:clamp(70px,12vw,150px); top:81.5%; }
#overlay-bottom { top:75%; }

/* ESTADO VISIBLE */
.visible {
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* DELAYS DE APARICIÓN 1.0 */
.delay-1 { transition-delay: 0.1s; }
.delay-2 { transition-delay: 0.4s; }
.delay-3 { transition-delay: 0.7s; }

footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container" id="img-container">
  <img src="images/grapas.jpg" alt="">

  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
  <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>

  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
/**
 * RECENTER DINÁMICO
 * En lugar de mover GRA a la izquierda, calculamos el centro visual 
 * del conjunto (GRA + Palabra Secundaria) y movemos todo el bloque.
 */
function recenterGroup(mainId, secondaryIds) {
  const containerW = document.getElementById('img-container').offsetWidth;
  const mainEl = document.getElementById(mainId);
  const secondaryEls = secondaryIds.map(id => document.getElementById(id));
  
  // 1. Obtener el ancho de "GRA" (sin la PA)
  const graW = mainEl.querySelector('.gra').getBoundingClientRect().width;
  
  // 2. Obtener el ancho de las palabras secundarias (MU5EO, FIA...)
  const sideWs = secondaryEls.map(el => el.getBoundingClientRect().width);
  
  // 3. El ancho del "bloque visual" es el máximo de ellos
  const blockW = Math.max(graW, ...sideWs);
  
  // 4. Calcular cuánto hay que desplazar TODO el grupo para que ese 
  // bloque de ancho 'blockW' quede centrado en pantalla.
  // Como todos tienen left:50% y transform:translateX(-50%), 
  // su centro está en containerW/2. Queremos que su borde izquierdo esté en:
  const targetLeft = (containerW - blockW) / 2;
  
  // El offset para GRA (que estaba centrado)
  const mainOffset = targetLeft - (containerW/2 - graW/2);
  mainEl.style.transform = `translateX(calc(-50% + ${mainOffset}px)) translateY(0)`;

  // El offset para los secundarios (que estaban centrados)
  secondaryEls.forEach((el, i) => {
    const secOffset = targetLeft - (containerW/2 - sideWs[i]/2);
    el.style.transform = `translateX(calc(-50% + ${secOffset}px)) translateY(0)`;
  });
}

const sections = [
  { trigger: 'museo', main: 'overlay-top', secondary: ['museo', 'fia-superior'] },
  { trigger: 'esceno', main: 'overlay-bottom', secondary: ['esceno', 'fia-inferior'] }
];

sections.forEach(group => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const main = document.getElementById(group.main);
      const side1 = document.getElementById(group.secondary[0]);
      const side2 = document.getElementById(group.secondary[1]);

      if (entry.isIntersecting) {
        // PASO 1: Aparecer (Ritmo 1.0)
        main.classList.add('visible');
        side1.classList.add('visible');
        side2.classList.add('visible');

        // PASO 2: Movimiento PA (400ms después de que aparezca MU5EO/E5CENO)
        setTimeout(() => {
          if(!entry.isIntersecting) return;
          main.classList.add('shift');

          // PASO 3: Desaparecer PA y RE-CENTRAR TODO (400ms después del shift)
          setTimeout(() => {
            if(!entry.isIntersecting) return;
            main.classList.add('fade-pa');
            
            // Recalculamos posición para que el conjunto se vea centrado
            recenterGroup(group.main, group.secondary);
            
          }, 400);
        }, 400);

      } else {
        // RESET TOTAL
        [main, side1, side2].forEach(el => {
          el.classList.remove('visible', 'shift', 'fade-pa');
          el.style.transform = ''; // Limpia el centrado dinámico
        });
      }
    });
  }, { threshold: 0.3 });

  observer.observe(document.getElementById(group.trigger));
});

// Ajuste si cambia el tamaño de la pantalla
window.addEventListener('resize', () => {
  sections.forEach(group => {
    const main = document.getElementById(group.main);
    if(main.classList.contains('fade-pa')) {
      recenterGroup(group.main, group.secondary);
    }
  });
});
</script>

</body>
</html>
