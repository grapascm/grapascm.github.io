<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
  min-height: 300vh;
}

/* HERO */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* Footer */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}

/* Imagen */
.background-image-container {
  position:relative;
}

.background-image-container img {
  width:100%;
  height:auto;
}

/* BASE TEXTO */
.overlay-line {
  position:absolute;
  color:#E4E8ED;
  opacity:0;
  transition:0.5s;
  white-space:nowrap;
}

.center {
  text-align:center;
  font-size:clamp(100px,15vw,200px);
}

.left-align {
  text-align:left;
  padding-left:0.09em; /* desplazamiento después de la G */
  font-size:clamp(55px,9.5vw,110px);
}

#fia-superior, #fia-inferior {
  font-size:clamp(70px,12vw,150px);
}

/* posiciones */
#overlay-top { top:25%; left:50%; transform:translateX(-50%); }
#overlay-bottom { top:75%; left:50%; transform:translateX(-50%); }

#museo { top:21.5%; }
#fia-superior { top:31.5%; }
#esceno { top:71.5%; }
#fia-inferior { top:81.5%; }

/* centrado final del conjunto */
.recenter {
  left:50% !important;
  transform:translateX(-50%) !important;
}

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg">

  <!-- GRAPA -->
  <div class="overlay-line center" id="overlay-top">GRAPA</div>
  <div class="overlay-line center" id="overlay-bottom">GRAPA</div>

  <!-- MUSEOGRAFIA -->
  <div class="overlay-line left-align" id="museo">MU5EO</div>
  <div class="overlay-line left-align" id="fia-superior">FIA</div>

  <!-- ESCENOGRAFIA -->
  <div class="overlay-line left-align" id="esceno">E5CENO</div>
  <div class="overlay-line left-align" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const elsTop = {
  grapa: document.getElementById('overlay-top'),
  museo: document.getElementById('museo'),
  fia: document.getElementById('fia-superior')
};
const elsBottom = {
  grapa: document.getElementById('overlay-bottom'),
  esceno: document.getElementById('esceno'),
  fia: document.getElementById('fia-inferior')
};

const bg = document.querySelector('.background-image-container');
const vh = window.innerHeight;

window.addEventListener('scroll',()=>{
  const y = window.scrollY;
  const top = bg.offsetTop;
  const h = bg.offsetHeight;

  // === MITAD SUPERIOR ===
  const showTop = (y >= top - vh/2 && y < top + h/2 - vh/2);
  elsTop.grapa.style.opacity = showTop ? 1 : 0;

  if(showTop){
    setTimeout(()=>{ elsTop.museo.style.opacity = 1; elsTop.fia.style.opacity = 1; }, 200);
    setTimeout(()=>{ elsTop.grapa.classList.add('move-right'); }, 600);
    setTimeout(()=>{ elsTop.grapa.style.opacity = 0; elsTop.museo.classList.add('recenter'); elsTop.fia.classList.add('recenter'); elsTop.grapa.classList.remove('move-right'); }, 1000);
  } else {
    // reversible
    elsTop.grapa.style.opacity = 0;
    elsTop.museo.style.opacity = 0; elsTop.fia.style.opacity = 0;
    elsTop.grapa.classList.remove('move-right');
    elsTop.museo.classList.remove('recenter');
    elsTop.fia.classList.remove('recenter');
  }

  // === MITAD INFERIOR ===
  const showBottom = (y >= top + h/2 - vh/2);
  elsBottom.grapa.style.opacity = showBottom ? 1 : 0;

  if(showBottom){
    setTimeout(()=>{ elsBottom.esceno.style.opacity = 1; elsBottom.fia.style.opacity = 1; }, 200);
    setTimeout(()=>{ elsBottom.grapa.classList.add('move-right'); }, 600);
    setTimeout(()=>{ elsBottom.grapa.style.opacity = 0; elsBottom.esceno.classList.add('recenter'); elsBottom.fia.classList.add('recenter'); elsBottom.grapa.classList.remove('move-right'); }, 1000);
  } else {
    // reversible
    elsBottom.grapa.style.opacity = 0;
    elsBottom.esceno.style.opacity = 0; elsBottom.fia.style.opacity = 0;
    elsBottom.grapa.classList.remove('move-right');
    elsBottom.esceno.classList.remove('recenter');
    elsBottom.fia.classList.remove('recenter');
  }
});
</script>

<style>
/* movimiento de PA */
.move-right {
  display:inline-block;
  transform:translateX(50px);
  transition: transform 0.5s ease;
}
</style>

</body>
</html>
