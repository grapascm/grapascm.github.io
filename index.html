<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA - Versión Final Corregida</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* --- HERO SECTION --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding: 20vh 20px 0 20px;
}

.hero-text {
  font-size: clamp(45px, 14vw, 200px);
  letter-spacing: 0.04em;
  margin-right: -0.04em; 
  color: #E4E8ED;
  line-height: 0.9;
}

.subtitle {
  margin-top: 8vh;
  font-size: clamp(10px, 2.2vw, 20px);
  letter-spacing: 0.35em;
  margin-right: -0.35em;
  max-width: 85vw;
}

.email-button {
  margin-top: 15vh;
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: 0.3em;
  margin-right: -0.3em;
  text-decoration: none;
  color: #E4E8ED;
  border: 1px solid rgba(228,232,237,0.2);
  padding: 15px 30px;
}

/* --- ESTRUCTURA DE IMÁGENES --- */
.background-image-container {
  position: relative;
  width: 100%;
}

.background-image-container img {
  width: 100%;
  height: auto;
  display: block;
}

/* --- CAPAS DE TEXTO --- */
.overlay-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  width: clamp(260px, 75vw, 1000px); 
  text-align: left;
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}

/* Posiciones Secciones 1 y 2 */
.center { font-size: clamp(40px, 15vw, 200px); }
#museo { font-size: clamp(25px, 9.5vw, 110px); top: 21.5%; }
#overlay-top { top: 25%; z-index: 5; }
#fia-superior { font-size: clamp(35px, 12vw, 150px); top: 31.5%; }

#esceno { font-size: clamp(22px, 9vw, 100px); top: 71.5%; }
#overlay-bottom { top: 75%; z-index: 5; }
#fia-inferior { font-size: clamp(35px, 12vw, 150px); top: 81.5%; }

/* Animación Base */
.overlay-line span { display: inline-block; transition: transform 0.6s ease, opacity 0.4s ease; }

.is-visible { opacity: 1; transform: translateX(-50%) translateY(0); }
.do-shift .pa { transform: translateX(0.35em); }
.do-fade-pa .pa { opacity: 0 !important; visibility: hidden; }
.do-recenter { transform: translateX(-50%) translateY(0) translateX(-8%); }

/* --- SECCIÓN 3: GRACIA5 (Misma línea, misma altura) --- */
.thanks-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translateX(-50%) translateY(-50%) translateY(20px);
  width: clamp(260px, 75vw, 1000px); 
  text-align: left;
  font-size: clamp(25px, 9.5vw, 120px); 
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}

.thanks-overlay span {
  display: inline-block;
  vertical-align: baseline; /* Clave para mantener la altura */
  transition: all 0.6s ease;
}

.extension-cia5 {
  opacity: 0;
  width: 0;
  overflow: hidden;
}

.show-cia5 .extension-cia5 {
  opacity: 1;
  width: auto;
  margin-right: 0.1em;
}

/* --- FOOTER --- */
footer {
  width: 100%;
  text-align: center;
  padding: 80px 0;
  font-size: 10px;
  opacity: 0.4;
}

@media (max-width: 600px) {
  #museo { top: 19%; }
  #fia-superior { top: 33%; }
  #esceno { top: 69%; }
  #fia-inferior { top: 83%; }
}
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">
  
  <div class="overlay-line center" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="museo">MU5EO</div>
  <div class="overlay-line" id="fia-superior">FIA</div>

  <div class="overlay-line center" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="esceno">E5CENO</div>
  <div class="overlay-line" id="fia-inferior">FIA</div>
</div>

<div class="background-image-container" id="container-3">
  <img src="images/grapa2.jpg" alt="">
  <div class="thanks-overlay" id="thanks-group">
    <span class="gra-3">GRA</span><span class="extension-cia5">CIA5</span><span class="pa-3 pa">PA</span>
  </div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
/* LÓGICA SECCIONES 1 Y 2 */
const groups = [
  { main: 'overlay-top', s1: 'museo', s2: 'fia-superior' },
  { main: 'overlay-bottom', s1: 'esceno', s2: 'fia-inferior' }
];

groups.forEach(group => {
  const m = document.getElementById(group.main);
  const sub1 = document.getElementById(group.s1);
  const sub2 = document.getElementById(group.s2);

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        // 1. Aparece GRAPA
        m.classList.add('is-visible');
        
        // 2. Se desplaza PA y aparecen los otros
        setTimeout(() => {
          if (!m.classList.contains('is-visible')) return;
          m.classList.add('do-shift');
          sub1.classList.add('is-visible');
          sub2.classList.add('is-visible');
        }, 800);

        // 3. Desaparece PA y recentra
        setTimeout(() => {
          if (!m.classList.contains('is-visible')) return;
          m.classList.add('do-fade-pa', 'do-recenter');
          sub1.classList.add('do-recenter');
          sub2.classList.add('do-recenter');
        }, 1800);
      } else {
        [m, sub1, sub2].forEach(el => el.classList.remove('is-visible', 'do-shift', 'do-fade-pa', 'do-recenter'));
      }
    });
  }, { threshold: 0.2 });
  observer.observe(m);
});

/* LÓGICA SECCIÓN 3: GRACIA5 */
const tg = document.getElementById('thanks-group');
const obs3 = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      // 1. Aparece GRAPA
      tg.classList.add('is-visible');
      
      // 2. Se desplaza PA
      setTimeout(() => {
        if (!tg.classList.contains('is-visible')) return;
        tg.classList.add('do-shift');
      }, 800);

      // 3. PA se va, Recentra y entra CIA5
      setTimeout(() => {
        if (!tg.classList.contains('is-visible')) return;
        tg.classList.add('do-fade-pa', 'do-recenter');
        setTimeout(() => {
          tg.classList.add('show-cia5');
        }, 400);
      }, 1800);
    } else {
      tg.classList.remove('is-visible', 'do-shift', 'do-fade-pa', 'do-recenter', 'show-cia5');
    }
  });
}, { threshold: 0.4 });
obs3.observe(document.getElementById('container-3'));
</script>

</body>
</html>
