<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('/fonts/GRAPA.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  font-family: 'GRAPA', sans-serif;
  background-color: #0A1A2A;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #BFC6CF;
}

.container {
  padding: 40px;
  text-transform: uppercase;
}

h1 {
  font-size: clamp(80px, 15vw, 200px);
  letter-spacing: 0.04em;
  color: #E4E8ED;
  line-height: 1; /* Asegura que el espacio sea controlado */
}

.subtitle {
  margin-top: 40px; /* Espacio aumentado entre GRAPA y Sociedad */
  font-size: clamp(14px, 2vw, 20px);
  letter-spacing: 0.35em;
  opacity: 0.8;
}

.email-button {
  display: inline-block;
  margin-top: 80px;
  font-size: clamp(14px, 1.5vw, 18px); /* Tamaño más pequeño y elegante */
  letter-spacing: 0.2em;
  text-decoration: none;
  color: #E4E8ED;
  border: 1px solid rgba(228, 232, 237, 0.3);
  padding: 15px 30px;
  transition: all 0.3s ease;
}

.email-button:hover {
  background-color: #E4E8ED;
  color: #0A1A2A;
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">
  <h1>GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  
  <a href="mailto:grapa@grapa.es" class="email-button">
    grapa@grapa.es
  </a>
</div>

</body>
</html>
