<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* --- HERO --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding: 20vh 20px 0 20px;
}

h1.hero-text {
  /* El 14vw asegura que nunca toque los bordes laterales */
  font-size: clamp(45px, 14vw, 200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  /* Reducimos un poco el vw para que el subtítulo no desborde en iPhone */
  font-size: clamp(10px, 2.5vw, 20px);
  letter-spacing:0.35em;
  max-width: 85%;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px, 1.2vw, 14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* --- FOOTER FIXED (Tu 1.0) --- */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
  pointer-events: none;
  z-index: 10;
}

/* --- CONTENEDOR IMAGEN --- */
.background-image-container {
  position:relative;
  width: 100%;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* --- TEXTOS OVERLAY (POSICIONES 1.0 EXACTAS) --- */
.overlay-line {
  position:absolute;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  width: 90vw; /* Asegura que el contenedor no empuje el scroll lateral */
  color:#E4E8ED;
  opacity:0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space:nowrap;
}

/* CLAVE DEL RESPONSIVE: 
   Bajamos los mínimos de clamp para que en móvil el texto 
   encoja lo suficiente para no pisar a la línea de arriba/abajo.
*/

.center {
  text-align:center;
  font-size: clamp(35px, 15vw, 200px);
}

#museo { top: 21.5%; font-size: clamp(22px, 8.5vw, 110px); }
#overlay-top { top: 25%; }
#fia-superior { top: 31.5%; font-size: clamp(28px, 11vw, 150px); }

#esceno { top: 71.5%; font-size: clamp(20px, 8vw, 100px); }
#overlay-bottom { top: 75%; }
#fia-inferior { top: 81.5%; font-size: clamp(28px, 11vw, 150px); }

/* --- ANIMACIONES --- */
.center span {
  display:inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

.shift .pa {
  transform: translateX(0.35em);
  transition-delay: 0.5s;
}

.fade-pa .pa { opacity:0; }

.recenter {
  transform:translateX(-50%) translateY(0) translateX(-8%);
}

.left-align {
  text-align:left;
  padding-left:0.09em;
}

.visible {
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.delay-1 { transition-delay:0.1s; }
.delay-2 { transition-delay:0.4s; }
.delay-3 { transition-delay:0.7s; }

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">

  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
  <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>

  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const sections = [
  { main: 'overlay-top', extras: ['museo', 'fia-superior'] },
  { main: 'overlay-bottom', extras: ['esceno', 'fia-inferior'] }
];

sections.forEach(group => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const main = document.getElementById(group.main);
      const s1 = document.getElementById(group.extras[0]);
      const s2 = document.getElementById(group.extras[1]);

      if (entry.isIntersecting) {
        main.classList.add('visible', 'shift');
        s1.classList.add('visible');
        s2.classList.add('visible');

        setTimeout(() => {
          if (main.classList.contains('visible')) {
            main.classList.add('fade-pa', 'recenter');
            s1.classList.add('recenter');
            s2.classList.add('recenter');
          }
        }, 1100); 

      } else {
        [main, s1, s2].forEach(el => {
          el.classList.remove('visible', 'shift', 'fade-pa', 'recenter');
        });
      }
    });
  }, { threshold: 0.2 });

  observer.observe(document.getElementById(group.main));
});
</script>

</body>
</html>
