<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

/* Evita fugas y scroll fantasma */
html, body {
  overflow-x: hidden;
  width: 100%;
  background-color: #0A1A2A;
}

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  color: #BFC6CF;
  /* Eliminado el 300vh para que el scroll sea natural */
}

/* --- HERO --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content: center;
  text-align:center;
  padding: 0 10px;
}

h1.hero-text {
  font-size: clamp(45px, 14vw, 200px); 
  /* Compensación de centrado: el margin-right negativo anula el empuje del letter-spacing */
  letter-spacing: 0.08em;
  margin-right: -0.08em; 
  color:#E4E8ED;
  line-height:0.9;
  width: 100%;
}

.subtitle {
  margin-top:5vh;
  font-size:clamp(10px, 2.5vw, 18px);
  letter-spacing:0.3em;
  margin-right: -0.3em; /* Compensación de centrado */
  max-width: 90%;
}

.email-button {
  margin-top:10vh;
  font-size:clamp(10px, 1.5vw, 14px);
  letter-spacing:0.3em;
  margin-right: -0.3em; /* Compensación de centrado */
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding: 12px 24px;
}

/* --- CONTENEDOR IMAGEN --- */
.background-image-container {
  position:relative;
  width: 100%;
  line-height: 0; /* Evita espacios vacíos debajo de la imagen */
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* --- TEXTOS ANIMADOS --- */
.overlay-line {
  position:absolute;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  width: 95vw; /* Más aire para evitar scroll lateral en móvil */
  color:#E4E8ED;
  opacity:0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space:nowrap;
  pointer-events: none;
}

.center {
  text-align:center;
  font-size:clamp(40px, 15vw, 200px);
}

.center span {
  display:inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

.shift .pa {
  transform: translateX(0.3em);
  transition-delay:0.5s;
}

.fade-pa .pa {
  opacity:0;
}

/* Recenter original con el -8% que te gustaba */
.recenter {
  transform:translateX(-50%) translateY(0) translateX(-8%);
}

.left-align {
  text-align:left;
  padding-left: 2vw; /* Alineación relativa al ancho de pantalla */
}

/* Tamaños ajustados para no pisarse */
#museo { font-size:clamp(28px, 9.5vw, 110px); }
#esceno { font-size:clamp(25px, 9vw, 100px); }
#fia-superior, #fia-inferior { font-size:clamp(35px, 12vw, 150px); }

/* Posiciones proporcionales */
#overlay-top { top:25%; }
#overlay-bottom { top:75%; }
#museo { top:21%; }
#fia-superior { top:31%; }
#esceno { top:71%; }
#fia-inferior { top:81%; }

.visible {
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.delay-1 { transition-delay:0.1s; }
.delay-2 { transition-delay:0.4s; }
.delay-3 { transition-delay:0.7s; }

/* --- FOOTER FINAL --- */
footer {
  text-align:center;
  padding: 60px 0; /* Ahora el footer es parte del flujo, no fijo */
  font-size: 10px;
  opacity:0.5;
  background-color: #0A1A2A;
}
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">

  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
  <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>

  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const sections = [
  ['overlay-top', 'museo', 'fia-superior'],
  ['overlay-bottom', 'esceno', 'fia-inferior']
];

sections.forEach(group => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const main = document.getElementById(group[0]); 
      const s1 = document.getElementById(group[1]);   
      const s2 = document.getElementById(group[2]);   

      if (entry.isIntersecting) {
        main.classList.add('visible', 'shift');
        s1.classList.add('visible');
        s2.classList.add('visible');

        setTimeout(() => {
          if (main.classList.contains('visible')) {
            main.classList.add('fade-pa', 'recenter');
            s1.classList.add('recenter');
            s2.classList.add('recenter');
          }
        }, 1200);

      } else {
        main.classList.remove('visible', 'shift', 'fade-pa', 'recenter');
        s1.classList.remove('visible', 'recenter');
        s2.classList.remove('visible', 'recenter');
      }
    });
  }, { threshold: 0.1 }); 

  observer.observe(document.getElementById(group[0]));
});
</script>

</body>
</html>
