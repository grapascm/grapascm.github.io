<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color:#BFC6CF;
  min-height:300vh;
}

/* HERO */
.hero {
  min-height:100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* Footer */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}

/* Imagen */
.background-image-container {
  position:relative;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* Contenedor de grupo */
.group-container {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  transition: transform 0.8s ease;
  white-space:nowrap;
}

/* BASE TEXTO */
.overlay-line {
  display:block;
  color:#E4E8ED;
  opacity:0;
  transition: opacity 0.6s ease, transform 0.6s ease;
}

/* GRAPA */
.center {
  font-size:clamp(100px,15vw,200px);
}

.center span {
  display:inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

/* PA movimiento */
.shift .pa {
  transform: translateX(0.35em);
  transition-delay:0.5s;
}

/* PA desaparece */
.fade-pa .pa {
  opacity:0;
}

/* alineación izquierda */
.left-align {
  text-align:left;
  padding-left:0.09em;
}

/* tamaños */
#museo { font-size:clamp(55px,9.5vw,110px); }
#esceno { font-size:clamp(50px,9vw,100px); }
#fia-superior, #fia-inferior { font-size:clamp(70px,12vw,150px); }

/* posiciones */
#overlay-top-container { top:25%; }
#overlay-bottom-container { top:75%; }

#museo { top:0; }
#fia-superior { top:10%; }

#esceno { top:0; }
#fia-inferior { top:10%; }

/* visible */
.visible {
  opacity:1;
  transform:translateY(0);
}

/* delays */
.delay-1 { transition-delay:0.1s; }
.delay-2 { transition-delay:0.4s; }
.delay-3 { transition-delay:0.7s; }
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg">

  <!-- SUPERIOR -->
  <div class="group-container" id="overlay-top-container">
    <div class="overlay-line center delay-1">
      <span class="gra">GRA</span><span class="pa">PA</span>
    </div>
    <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
    <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>
  </div>

  <!-- INFERIOR -->
  <div class="group-container" id="overlay-bottom-container">
    <div class="overlay-line center delay-1">
      <span class="gra">GRA</span><span class="pa">PA</span>
    </div>
    <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
    <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
  </div>

</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const groups = [
  { container:'overlay-top-container', pa:true },
  { container:'overlay-bottom-container', pa:true }
];

groups.forEach(g=>{
  const container = document.getElementById(g.container);
  const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        container.querySelectorAll('.overlay-line').forEach(el=>{
          el.classList.add('visible');
        });

        if(g.pa){
          const graEl = container.querySelector('.gra');
          graEl.parentElement.classList.add('shift');
          setTimeout(()=>{
            graEl.parentElement.classList.add('fade-pa');
            // Después de PA desaparecer, el contenedor se centra
            container.style.transform = 'translateX(-50%)';
          },400);
        }

      } else {
        container.querySelectorAll('.overlay-line').forEach(el=>{
          el.classList.remove('visible');
        });
        if(g.pa){
          const graEl = container.querySelector('.gra');
          graEl.parentElement.classList.remove('shift','fade-pa');
          container.style.transform = 'translateX(-50%)';
        }
      }
    });
  },{
    threshold:0.3
  });

  observer.observe(container);
});
</script>

</body>
</html>
