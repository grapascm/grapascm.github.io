<script>
const ids = ['overlay-top','overlay-bottom','museo','fia-superior','esceno','fia-inferior']
const els = ids.map(id => document.getElementById(id))
const bg = document.querySelector('.background-image-container')
const vh = window.innerHeight

let topTimer = null
let bottomTimer = null

window.addEventListener('scroll',()=>{
  const y = window.scrollY
  const top = bg.offsetTop
  const h = bg.offsetHeight

  const showTop = (y >= top - vh/2 && y < top + h/2 - vh/4)
  const showBottom = (y >= top + h/2 - vh/2 && y < top + h)

  /* RESET siempre que salimos */
  if(!showTop){
    els[0].style.opacity = 0
    els[2].style.opacity = 0
    els[3].style.opacity = 0
    clearTimeout(topTimer)
  }

  if(!showBottom){
    els[1].style.opacity = 0
    els[4].style.opacity = 0
    els[5].style.opacity = 0
    clearTimeout(bottomTimer)
  }

  /* SECUENCIA ARRIBA */
  if(showTop && els[0].style.opacity == 0){
    // GRAPA primero
    els[0].style.opacity = 1

    clearTimeout(topTimer)
    topTimer = setTimeout(()=>{
      // luego MU y FIA
      els[2].style.opacity = 1
      els[3].style.opacity = 1
    }, 400)
  }

  /* SECUENCIA ABAJO */
  if(showBottom && els[1].style.opacity == 0){
    // GRAPA primero
    els[1].style.opacity = 1

    clearTimeout(bottomTimer)
    bottomTimer = setTimeout(()=>{
      // luego ESCENO y FIA
      els[4].style.opacity = 1
      els[5].style.opacity = 1
    }, 400)
  }
})
</script>
