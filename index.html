<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
  position: relative;
}

/* HERO */
.hero {
  position: relative;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  text-align: center;
  padding-top: 20vh; /* aire por arriba */
  padding-left: 5vw;
  padding-right: 5vw;
  z-index: 2;
}

h1 {
  font-size: clamp(80px, 15vw, 200px);
  letter-spacing: 0.04em;
  color: #E4E8ED;
  line-height: 0.9;
}

.subtitle {
  margin-top: 8vh; /* espacio proporcional GRAPA → subtítulo */
  font-size: clamp(14px, 2vw, 20px);
  letter-spacing: 0.35em;
  opacity: 0.8;
}

.email-button {
  display: inline-block;
  margin-top: 18vh; /* más del doble entre subtítulo y email */
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: 0.3em;
  text-decoration: none;
  color: #E4E8ED;
  border: 1px solid rgba(228, 232, 237, 0.2);
  padding: 1vh 2vw;
  transition: all 0.3s ease;
  opacity: 0.7;
}

.email-button:hover {
  background-color: #E4E8ED;
  color: #0A1A2A;
  opacity: 1;
}

/* Footer fijo al pie */
footer {
  position: fixed;
  bottom: 60px;
  width: 100%;
  text-align: center;
  font-size: clamp(10px, 1.1vw, 12px);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  opacity: 0.5;
  color: #BFC6CF;
  z-index: 2;
}

/* Imagen scrollable */
.background-image-container {
  width: 100%;
  display: block;
  text-align: center;
  overflow: hidden;
}

.background-image-container img {
  width: 100%;
  height: auto; /* mantiene proporción */
  display: block;
  max-width: 100%;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  h1 { font-size: clamp(50px, 12vw, 150px); }
  .subtitle { margin-top: 6vh; }
  .email-button { margin-top: 14vh; padding: 1vh 3vw; }
  footer { bottom: 50px; }
}

@media (max-width: 480px) {
  h1 { font-size: clamp(40px, 10vw, 100px); }
  .subtitle { margin-top: 4vh; letter-spacing: 0.2em; }
  .email-button { margin-top: 10vh; padding: 1vh 4vw; }
  footer { bottom: 40px; }
}
</style>
</head>
<body>

<div class="hero">
  <h1>GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.es" class="email-button">grapa@grapa.es</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="GRAPA">
</div>

<footer>&copy; 2025 GRAPA</footer>

</body>
</html>
