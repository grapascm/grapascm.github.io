<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
}

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* --- PANTALLA PRINCIPAL --- */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: clamp(80px, 15vw, 200px);
  letter-spacing: 0.04em;
  color: #E4E8ED;
  line-height: 0.9;
}

.subtitle {
  margin-top: 160px; /* Espacio extra solicitado */
  font-size: clamp(14px, 2vw, 20px);
  letter-spacing: 0.35em;
  opacity: 0.8;
}

.email-button {
  display: inline-block;
  margin-top: 60px;
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: 0.3em;
  text-decoration: none;
  color: #E4E8ED;
  border: 1px solid rgba(228, 232, 237, 0.2);
  padding: 12px 24px;
  transition: all 0.3s ease;
  opacity: 0.7;
}

.email-button:hover {
  background-color: #E4E8ED;
  color: #0A1A2A;
  opacity: 1;
}

/* --- SECCIÓN IMAGEN FINAL --- */
.final-image {
  width: 100%;
  height: auto;
  display: block;
  margin-top: 50px;
}

/* --- PIE DE PÁGINA --- */
footer {
  padding: 80px 20px 40px 20px;
  text-align: center;
  font-size: clamp(10px, 1.1vw, 12px);
  letter-spacing: 0.25em;
  opacity: 0.5;
  color: #BFC6CF;
}
</style>
</head>

<body>

  <!-- Pantalla Principal -->
  <section class="hero">
    <h1>GRAPA</h1>
    <div class="subtitle">5ociedad Cooperativa Madrileña</div>
    <a href="mailto:grapa@grapa.es" class="email-button">grapa@grapa.es</a>
  </section>

  <!-- Imagen de cierre (sin animaciones) -->
  <img src="images/grapa2.jpg" alt="GRAPA" class="final-image">

  <!-- Créditos al final -->
  <footer>
    GRAPA Julio 2025 ®
  </footer>

</body>
</html>
