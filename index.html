<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA 4.0 - Secuencia Completa</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* --- HERO --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding: 20vh 20px 0 20px;
}

h1.hero-text {
  font-size: clamp(45px, 14vw, 200px);
  letter-spacing: 0.04em;
  margin-right: -0.04em; 
  color: #E4E8ED;
  line-height: 0.9;
}

/* --- CONTENEDORES --- */
.background-image-container { position: relative; width: 100%; }
.background-image-container img { width:100%; height:auto; display:block; }

.overlay-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  width: clamp(260px, 75vw, 1000px); 
  text-align: left;
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}

/* --- SECCIONES 1 Y 2 (ESTÁNDAR) --- */
.center { font-size: clamp(40px, 15vw, 200px); }
#museo { font-size: clamp(25px, 9.5vw, 110px); top: 21.5%; }
#overlay-top { top: 25%; }
#fia-superior { font-size: clamp(35px, 12vw, 150px); top: 31.5%; }

#esceno { font-size: clamp(22px, 9vw, 100px); top: 71.5%; }
#overlay-bottom { top: 75%; }
#fia-inferior { font-size: clamp(35px, 12vw, 150px); top: 81.5%; }

.overlay-line span { display: inline-block; transition: transform 0.6s ease, opacity 0.4s ease; }
.shift .pa { transform: translateX(0.35em); transition-delay: 0.5s; }
.fade-pa .pa { opacity: 0 !important; visibility: hidden; }
.recenter { transform: translateX(-50%) translateY(0) translateX(-8%); }
.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* --- SECCIÓN 3: GRACIA5 (LA SECUENCIA) --- */
.thanks-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translateX(-50%) translateY(-50%) translateY(20px);
  width: clamp(260px, 75vw, 1000px); 
  text-align: left;
  font-size: clamp(25px, 9.5vw, 120px); 
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}

.thanks-overlay span {
  display: inline-block;
  transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Estado inicial: CIA5 invisible y sin espacio */
.extension-cia5 {
  opacity: 0;
  width: 0;
  overflow: hidden;
}

/* PASO 1: GRA y PA aparecen SEPARADOS */
.step-1-separated .pa-3 {
  transform: translateX(0.8em); /* Gran separación inicial */
}

/* PASO 2: Aparece CIA5 separado */
.step-2-cia5-in .extension-cia5 {
  opacity: 1;
  width: auto;
  margin: 0 0.4em; /* Espacio entre las partes */
}
.step-2-cia5-in .pa-3 {
  transform: translateX(1.2em); /* Empujamos PA más allá */
}

/* PASO 3: GRAPA junto (CIA5 se contrae, PA vuelve) */
.step-3-together .extension-cia5 {
  opacity: 0;
  width: 0;
  margin: 0;
}
.step-3-together .pa-3 {
  transform: translateX(0); /* Se pegan */
}

/* PASO 4: PA se va y Recentramos */
.step-4-fade-pa .pa-3 {
  opacity: 0;
  transform: translateX(0.5em);
  visibility: hidden;
}

/* PASO 5: Aparece CIA5 final y centra */
.step-5-final .extension-cia5 {
  opacity: 1;
  width: auto;
}
.step-5-final {
  transform: translateX(-50%) translateY(-50%) translateX(-8%);
}

.visible-3 {
  opacity: 1;
  transform: translateX(-50%) translateY(-50%) translateY(0);
}

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">
  
  <div class="overlay-line center" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="museo">MU5EO</div>
  <div class="overlay-line" id="fia-superior">FIA</div>

  <div class="overlay-line center" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="esceno">E5CENO</div>
  <div class="overlay-line" id="fia-inferior">FIA</div>
</div>

<div class="background-image-container" id="container-3">
  <img src="images/grapa2.jpg" alt="Gracias">
  <div class="thanks-overlay" id="thanks-group">
    <span class="gra-3">GRA</span>
    <span class="extension-cia5">CIA5</span>
    <span class="pa-3">PA</span>
  </div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
/* SECCIONES 1 Y 2 */
const sections = [['overlay-top', 'museo', 'fia-superior'], ['overlay-bottom', 'esceno', 'fia-inferior']];
sections.forEach(group => {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const m = document.getElementById(group[0]), s1 = document.getElementById(group[1]), s2 = document.getElementById(group[2]);
      if (entry.isIntersecting) {
        m.classList.add('visible', 'shift'); s1.classList.add('visible'); s2.classList.add('visible');
        setTimeout(() => { if (m.classList.contains('visible')) { m.classList.add('fade-pa', 'recenter'); s1.classList.add('recenter'); s2.classList.add('recenter'); } }, 1200);
      } else { [m, s1, s2].forEach(el => el.classList.remove('visible', 'shift', 'fade-pa', 'recenter')); }
    });
  }, { threshold: 0.15 });
  obs.observe(document.getElementById(group[0]));
});

/* SECCIÓN 3: LA CADENA DE ANIMACIÓN */
const tg = document.getElementById('thanks-group');
const obs3 = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      // T=0: Aparece GRAPA separado
      tg.classList.add('visible-3', 'step-1-separated');
      
      // T=1s: Aparece CIA5 separado
      setTimeout(() => tg.classList.add('step-2-cia5-in'), 1000);
      
      // T=2s: Se juntan como GRAPA
      setTimeout(() => {
        tg.classList.remove('step-1-separated', 'step-2-cia5-in');
        tg.classList.add('step-3-together');
      }, 2000);
      
      // T=3s: PA se va y empezamos el recentrado
      setTimeout(() => {
        tg.classList.add('step-4-fade-pa');
        
        // T=3.6s: Aparece CIA5 final (formando GRACIA5)
        setTimeout(() => {
          tg.classList.add('step-5-final');
        }, 600);
        
      }, 3000);

    } else {
      // Reset total
      tg.className = 'thanks-overlay';
    }
  });
}, { threshold: 0.4 });
obs3.observe(document.getElementById('container-3'));
</script>

</body>
</html>
