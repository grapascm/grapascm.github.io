<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA 3.7 - Limpia</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* --- HERO --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding: 20vh 20px 0 20px;
}

h1.hero-text {
  font-size: clamp(45px, 14vw, 200px);
  letter-spacing: 0.04em;
  margin-right: -0.04em; 
  color: #E4E8ED;
  line-height: 0.9;
}

/* --- SECCIONES 1 Y 2 --- */
.background-image-container { position: relative; width: 100%; }
.background-image-container img { width:100%; height:auto; display:block; }

.overlay-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  width: clamp(260px, 75vw, 1000px); 
  text-align: left;
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}

.center { font-size: clamp(40px, 15vw, 200px); }
#museo { font-size: clamp(25px, 9.5vw, 110px); top: 21.5%; }
#overlay-top { top: 25%; }
#fia-superior { font-size: clamp(35px, 12vw, 150px); top: 31.5%; }

#esceno { font-size: clamp(22px, 9vw, 100px); top: 71.5%; }
#overlay-bottom { top: 75%; }
#fia-inferior { font-size: clamp(35px, 12vw, 150px); top: 81.5%; }

.overlay-line span { display: inline-block; transition: transform 0.6s ease, opacity 0.4s ease; }
.shift .pa { transform: translateX(0.35em); transition-delay: 0.5s; }
.fade-pa .pa { opacity: 0 !important; visibility: hidden; }
.recenter { transform: translateX(-50%) translateY(0) translateX(-8%); }
.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* --- SECCIÓN 3: GRACIA5 (LIMPIEZA TOTAL) --- */
.thanks-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translateX(-50%) translateY(-50%);
  display: flex;
  align-items: center;
  font-size: clamp(25px, 9.5vw, 120px); 
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.8s ease, transform 0.8s ease;
  white-space: nowrap;
}

.thanks-overlay span { display: inline-block; }

/* PA3: Transición limpia de separación y desvanecimiento */
.pa-3 {
  transition: transform 0.5s ease, opacity 0.3s ease;
}

/* CIA5: Oculto inicialmente sin ocupar espacio */
.extension-cia5 {
  width: 0;
  opacity: 0;
  overflow: hidden;
  transition: width 0.5s ease, opacity 0.4s ease;
  letter-spacing: 0.05em;
}

/* 1. SEPARACIÓN: PA se mueve y se queda ahí */
.shift-3 .pa-3 {
  transform: translateX(0.4em);
}

/* 2. DESAPARECER: PA se esfuma */
.fade-pa-3 .pa-3 {
  opacity: 0 !important;
  transform: translateX(0.6em); /* Un pelín más de movimiento al irse */
}

/* 3. TRANSFORMAR: Entra CIA5 y centramos el bloque */
.become-thanks .extension-cia5 {
  width: auto;
  opacity: 1;
  margin-right: 0.1em; /* Espacio estético */
}

/* Reset de la PA3 para que no moleste al centrado final */
.become-thanks .pa-3 {
  display: none; 
}

.visible-3 { opacity: 1; }

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">
  
  <div class="overlay-line center" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="museo">MU5EO</div>
  <div class="overlay-line" id="fia-superior">FIA</div>

  <div class="overlay-line center" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="esceno">E5CENO</div>
  <div class="overlay-line" id="fia-inferior">FIA</div>
</div>

<div class="background-image-container" id="container-3">
  <img src="images/grapa2.jpg" alt="Gracias">
  <div class="thanks-overlay" id="thanks-group">
    <span class="gra-3">GRA</span>
    <span class="extension-cia5">CIA5</span>
    <span class="pa-3">PA</span>
  </div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
/* LÓGICA SECCIONES 1 Y 2 */
const sections = [['overlay-top', 'museo', 'fia-superior'], ['overlay-bottom', 'esceno', 'fia-inferior']];
sections.forEach(group => {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const m = document.getElementById(group[0]), s1 = document.getElementById(group[1]), s2 = document.getElementById(group[2]);
      if (entry.isIntersecting) {
        m.classList.add('visible', 'shift'); s1.classList.add('visible'); s2.classList.add('visible');
        setTimeout(() => { if (m.classList.contains('visible')) { m.classList.add('fade-pa', 'recenter'); s1.classList.add('recenter'); s2.classList.add('recenter'); } }, 1200);
      } else { [m, s1, s2].forEach(el => el.classList.remove('visible', 'shift', 'fade-pa', 'recenter')); }
    });
  }, { threshold: 0.15 });
  obs.observe(document.getElementById(group[0]));
});

/* LÓGICA SECCIÓN 3: GRACIA5 (PASOS LIMPIOS) */
const tGroup = document.getElementById('thanks-group');
const obs3 = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      // Paso 1: Aparece y se separa (se queda separado)
      tGroup.classList.add('visible-3');
      setTimeout(() => tGroup.classList.add('shift-3'), 600);
      
      // Paso 2: Desaparece PA (Limpio)
      setTimeout(() => {
        if (!tGroup.classList.contains('visible-3')) return;
        tGroup.classList.add('fade-pa-3');
        
        // Paso 3: Aparece CIA5 (La formación final de la palabra)
        setTimeout(() => {
          tGroup.classList.add('become-thanks');
        }, 500);
        
      }, 1800); 
    } else {
      tGroup.classList.remove('visible-3', 'shift-3', 'fade-pa-3', 'become-thanks');
    }
  });
}, { threshold: 0.4 });
obs3.observe(document.getElementById('container-3'));
</script>

</body>
</html>
