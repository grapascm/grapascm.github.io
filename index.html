<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
  min-height: 300vh;
}

/* HERO */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* Footer */
footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}

/* Imagen */
.background-image-container {
  position:relative;
}

.background-image-container img {
  width:100%;
  height:auto;
}

/* BASE TEXTO */
.overlay-line {
  position:absolute;
  color:#E4E8ED;
  opacity:0;
  transition:0.5s;
  white-space:nowrap;
}

/* GRAPA */
.center {
  text-align:center;
  font-size:clamp(100px,15vw,200px);
  left:50%;
  transform:translateX(-50%);
}

/* alineados con G */
.left-align {
  text-align:left;
  padding-left:0.09em; /* pequeño margen desde GRA */
  transition: transform 0.7s ease, left 0.7s ease;
  left:auto;
  transform:none;
}

/* tamaños */
#museo { font-size:clamp(55px,9.5vw,110px); top:21.5%; }
#fia-superior { font-size:clamp(70px,12vw,150px); top:31.5%; }

#esceno { font-size:clamp(50px,9vw,100px); top:71.5%; }
#fia-inferior { font-size:clamp(70px,12vw,150px); top:81.5%; }

/* GRAPA posiciones */
#overlay-top { top:25%; }
#overlay-bottom { top:75%; }

/* Recenter final después de PA */
.recenter {
  left:50% !important;
  transform:translateX(-50%) !important;
}

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="GRAPA">

  <!-- GRAPA -->
  <div class="overlay-line center" id="overlay-top">GRAPA</div>
  <div class="overlay-line center" id="overlay-bottom">GRAPA</div>

  <!-- MUSEOGRAFIA -->
  <div class="overlay-line left-align" id="museo">MU5EO</div>
  <div class="overlay-line left-align" id="fia-superior">FIA</div>

  <!-- ESCENOGRAFIA -->
  <div class="overlay-line left-align" id="esceno">E5CENO</div>
  <div class="overlay-line left-align" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
const els = {
  top: document.getElementById('overlay-top'),
  bottom: document.getElementById('overlay-bottom'),
  museo: document.getElementById('museo'),
  fiaTop: document.getElementById('fia-superior'),
  esceno: document.getElementById('esceno'),
  fiaBottom: document.getElementById('fia-inferior')
};

const bg = document.querySelector('.background-image-container');
const vh = window.innerHeight;

window.addEventListener('scroll', () => {
  const y = window.scrollY;
  const top = bg.offsetTop;
  const h = bg.offsetHeight;

  // Progresos
  const showTop = (y >= top - vh/2 && y < top + h/2 - vh);
  const showBottom = (y >= top + h/2 - vh/2);

  // GRAPA
  els.top.style.opacity = showTop ? 1 : 0;
  els.bottom.style.opacity = showBottom ? 1 : 0;

  // MUSEO/FIA
  els.museo.style.opacity = showTop ? 1 : 0;
  els.fiaTop.style.opacity = showTop ? 1 : 0;

  // ESCENO/FIA
  els.esceno.style.opacity = showBottom ? 1 : 0;
  els.fiaBottom.style.opacity = showBottom ? 1 : 0;

  // PA animation: se separa a la derecha y desaparece al 50% scroll
  const paProgressTop = Math.min(Math.max((y - (top - vh/2)) / (vh/4),0),1);
  const paProgressBottom = Math.min(Math.max((y - (top + h/2 - vh/2)) / (vh/4),0),1);

  els.top.style.transform = `translateX(${(-50 + paProgressTop*20)}%)`;
  els.bottom.style.transform = `translateX(${(-50 + paProgressBottom*20)}%)`;
  els.top.style.opacity = 1 - paProgressTop;
  els.bottom.style.opacity = 1 - paProgressBottom;

  // Recenter conjunto después de PA desaparece
  if(paProgressTop >= 1){
    els.museo.classList.add('recenter');
    els.fiaTop.classList.add('recenter');
    els.top.classList.add('recenter');
  } else {
    els.museo.classList.remove('recenter');
    els.fiaTop.classList.remove('recenter');
    els.top.classList.remove('recenter');
  }

  if(paProgressBottom >= 1){
    els.esceno.classList.add('recenter');
    els.fiaBottom.classList.add('recenter');
    els.bottom.classList.add('recenter');
  } else {
    els.esceno.classList.remove('recenter');
    els.fiaBottom.classList.remove('recenter');
    els.bottom.classList.remove('recenter');
  }
});
</script>

</body>
</html>
