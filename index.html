<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
  min-height: 200vh;
  position: relative;
}

/* Pantalla inicial */
.hero {
  position: relative;
  height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 2;
  text-align: center;
  padding: 0 20px;
}

h1 {
  font-size: clamp(80px, 15vw, 200px);
  letter-spacing: 0.04em;
  color: #E4E8ED;
  line-height: 0.9;
}

.subtitle {
  margin-top: 80px;
  font-size: clamp(14px, 2vw, 20px);
  letter-spacing: 0.35em;
  opacity: 0.8;
}

.email-button {
  display: inline-block;
  margin-top: 160px;
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: 0.3em;
  text-decoration: none;
  color: #E4E8ED;
  border: 1px solid rgba(228, 232, 237, 0.2);
  padding: 10px 20px;
  transition: all 0.3s ease;
  opacity: 0.7;
}

.email-button:hover {
  background-color: #E4E8ED;
  color: #0A1A2A;
  opacity: 1;
}

/* Línea de copyright */
footer {
  margin-top: 160px; 
  font-size: clamp(10px, 1.1vw, 12px);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  opacity: 0.5;
  color: #BFC6CF;
}

/* Imagen de fondo cover */
.background-image {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100svh;
  background-image: url('images/grapas.jpg');
  background-size: cover;        /* ⚡ ocupa toda la pantalla */
  background-repeat: no-repeat;
  background-position: center center;
  z-index: 1;
  transform: translateY(100%);
  transition: transform 0.8s ease-out;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .subtitle { margin-top: 60px; }
  .email-button { margin-top: 120px; }
  footer { margin-top: 240px; }
}

@media (max-width: 480px) {
  h1 { font-size: clamp(40px, 10vw, 100px); }
  .subtitle { margin-top: 40px; letter-spacing: 0.25em; }
  .email-button { margin-top: 100px; padding: 8px 16px; }
  footer { margin-top: 200px; }
}
</style>
</head>
<body>

<div class="hero">
  <h1>GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrileña</div>
  <a href="mailto:grapa@grapa.es" class="email-button">grapa@grapa.es</a>
  <footer>&copy; 2025 GRAPA</footer>
</div>

<div class="background-image"></div>

<script>
const bg = document.querySelector('.background-image');

window.addEventListener('scroll', () => {
  const scrollY = window.scrollY;
  const vh = window.innerHeight;

  if (scrollY > vh * 0.1) {
    bg.style.transform = 'translateY(0)'; // imagen entra
  } else {
    bg.style.transform = 'translateY(100%)'; // imagen sale
  }
});
</script>

</body>
</html>
