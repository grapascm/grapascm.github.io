<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* HERO - Fiel a 1.0 */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

/* IMAGEN Y CONTENEDOR */
.background-image-container {
  position:relative;
  width: 100%;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* TEXTOS OVERLAY - Lógica 1.0 */
.overlay-line {
  position:absolute;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  width:clamp(300px,80vw,1200px);
  color:#E4E8ED;
  opacity:0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space:nowrap;
  pointer-events: none;
}

.center {
  text-align:center;
  font-size:clamp(100px,15vw,200px);
}

.center span {
  display:inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

/* PASO 2: SHIFT (Movimiento PA) */
.shift .pa {
  transform: translateX(0.35em);
}

/* PASO 3: FADE PA */
.fade-pa .pa {
  opacity:0;
}

/* RECENTER ESTABLE: En lugar de un % fijo, usamos una variable calculada */
.recenter {
  transform: translateX(calc(-50% - var(--offset, 0px))) translateY(0) !important;
}

.left-align {
  text-align:left;
  /* Ajuste fino para alinear con la G de GRAPA */
  padding-left: 0.1em; 
}

/* POSICIONES Y TAMAÑOS 1.0 */
#museo          { font-size:clamp(55px,9.5vw,110px); top:21.5%; }
#fia-superior   { font-size:clamp(70px,12vw,150px); top:31.5%; }
#overlay-top    { top:25%; }

#esceno         { font-size:clamp(50px,9vw,100px); top:71.5%; }
#fia-inferior   { font-size:clamp(70px,12vw,150px); top:81.5%; }
#overlay-bottom { top:75%; }

/* VISIBILIDAD */
.visible {
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.delay-1 { transition-delay:0.1s; }
.delay-2 { transition-delay:0.4s; }
.delay-3 { transition-delay:0.7s; }

footer {
  text-align:center;
  padding: 40px 0;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
}
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container" id="main-container">
  <img src="images/grapas.jpg" alt="">

  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
  <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>

  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
/**
 * CALCULO DE OFFSET
 * Para que el recenter sea estable, medimos cuánto mide 'PA'
 * y desplazamos el bloque exactamente la mitad de ese ancho.
 */
function setOffset(mainId) {
  const mainEl = document.getElementById(mainId);
  const pa = mainEl.querySelector('.pa');
  const offset = pa.offsetWidth / 2;
  // Aplicamos el offset al contenedor de la imagen para que afecte a sus hijos
  document.documentElement.style.setProperty('--offset', `${offset}px`);
}

const sections = [
  { trigger: 'museo', main: 'overlay-top', secondary: ['museo', 'fia-superior'] },
  { trigger: 'esceno', main: 'overlay-bottom', secondary: ['esceno', 'fia-inferior'] }
];

sections.forEach(group => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const main = document.getElementById(group.main);
      const s1 = document.getElementById(group.secondary[0]);
      const s2 = document.getElementById(group.secondary[1]);

      if (entry.isIntersecting) {
        // COREOGRAFÍA 1.0
        main.classList.add('visible');
        s1.classList.add('visible');
        s2.classList.add('visible');

        setTimeout(() => {
          if(!entry.isIntersecting) return;
          main.classList.add('shift');

          setTimeout(() => {
            if(!entry.isIntersecting) return;
            // Calculamos el offset justo antes de mover
            const paWidth = main.querySelector('.pa').offsetWidth;
            const offsetValue = paWidth / 2;
            
            // Aplicamos el movimiento
            main.style.setProperty('--offset', `${offsetValue}px`);
            main.classList.add('fade-pa', 'recenter');
            
            s1.style.setProperty('--offset', `${offsetValue}px`);
            s1.classList.add('recenter');
            
            s2.style.setProperty('--offset', `${offsetValue}px`);
            s2.classList.add('recenter');
          }, 400);
        }, 400);

      } else {
        // RESET
        [main, s1, s2].forEach(el => {
          el.classList.remove('visible', 'shift', 'fade-pa', 'recenter');
          el.style.removeProperty('--offset');
        });
      }
    });
  }, { threshold: 0.3 });

  observer.observe(document.getElementById(group.trigger));
});
</script>

</body>
</html>
