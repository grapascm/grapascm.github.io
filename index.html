<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('fonts/GRAPA.woff2') format('woff2');
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  font-family: 'GRAPA', sans-serif;
  background: url('imagen.jpg') no-repeat center center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
}

.overlay {
  background: rgba(0,0,0,0.4);
  padding: 40px 60px;
  border-radius: 6px;
}

button {
  font-family: 'GRAPA', sans-serif;
  font-size: 20px;
  letter-spacing: 3px;
  padding: 15px 40px;
  border: none;
  background: white;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  background: #ddd;
}
</style>
</head>

<body>

<div class="overlay">
  <a href="mailto:grapa@grapa.es">
    <button>CONTACTAR</button>
  </a>
</div>

</body>
</html>
