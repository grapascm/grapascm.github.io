<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA 3.9 - Coherente</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
  overflow-x: hidden;
}

/* --- HERO --- */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding: 20vh 20px 0 20px;
}

h1.hero-text {
  font-size: clamp(45px, 14vw, 200px);
  letter-spacing: 0.04em;
  margin-right: -0.04em; 
  color: #E4E8ED;
  line-height: 0.9;
}

/* --- SECCIONES GENERALES --- */
.background-image-container { position: relative; width: 100%; }
.background-image-container img { width:100%; height:auto; display:block; }

.overlay-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  width: clamp(260px, 75vw, 1000px); 
  text-align: left;
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}

/* Tamaños coherentes */
.center { font-size: clamp(40px, 15vw, 200px); }
#museo { font-size: clamp(25px, 9.5vw, 110px); top: 21.5%; }
#overlay-top { top: 25%; }
#fia-superior { font-size: clamp(35px, 12vw, 150px); top: 31.5%; }

#esceno { font-size: clamp(22px, 9vw, 100px); top: 71.5%; }
#overlay-bottom { top: 75%; }
#fia-inferior { font-size: clamp(35px, 12vw, 150px); top: 81.5%; }

/* Animaciones v2.1 (Seda) */
.overlay-line span { display: inline-block; transition: transform 0.6s ease, opacity 0.4s ease; }
.shift .pa { transform: translateX(0.35em); transition-delay: 0.5s; }
.fade-pa .pa { opacity: 0 !important; visibility: hidden; }
.recenter { transform: translateX(-50%) translateY(0) translateX(-8%); }
.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  #museo { top: 19%; }
  #fia-superior { top: 33%; }
  #esceno { top: 69%; }
  #fia-inferior { top: 83%; }
}

/* --- SECCIÓN 3: GRACIA5 (NUEVA COREOGRAFÍA COHERENTE) --- */
#img-container-3 {
  position: relative;
}

.thanks-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translateX(-50%) translateY(-50%) translateY(20px);
  /* Mismo ancho y alineación que los bloques superiores */
  width: clamp(260px, 75vw, 1000px); 
  text-align: left;
  /* Tamaño elegante (estilo MUSEO) */
  font-size: clamp(25px, 9.5vw, 120px); 
  color: #E4E8ED;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space: nowrap;
}

.thanks-overlay span {
  display: inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease, letter-spacing 0.6s ease;
}

/* Estado inicial: GRAPA ocultando CIA5 */
.extension-cia5 {
  opacity: 0;
  visibility: hidden;
  letter-spacing: -1em; /* Truco para que PA se pegue a GRA */
}

/* Coreografía Paso 1: Shift de la PA3 (Igual que arriba) */
.shift-3 .pa-3 {
  transform: translateX(0.35em);
  transition-delay: 0.5s;
}

/* Coreografía Paso 2: Fade de la PA3 (Igual que arriba) */
.fade-pa-3 .pa-3 {
  opacity: 0 !important;
  visibility: hidden;
}

/* Coreografía Paso 3: Recentrado (Igual que arriba, clavando el -8%) */
.recenter-3 {
  transform: translateX(-50%) translateY(-50%) translateY(0) translateX(-8%);
}

/* Coreografía Paso 4: Aparece CIA5 al final */
.become-thanks .extension-cia5 {
  opacity: 1;
  visibility: visible;
  letter-spacing: normal;
}

.visible-3 {
  opacity: 1;
  transform: translateX(-50%) translateY(-50%) translateY(0);
}

</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
</div>

<div class="background-image-container">
  <img src="images/grapas.jpg" alt="">
  
  <div class="overlay-line center" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="museo">MU5EO</div>
  <div class="overlay-line" id="fia-superior">FIA</div>

  <div class="overlay-line center" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line" id="esceno">E5CENO</div>
  <div class="overlay-line" id="fia-inferior">FIA</div>
</div>

<div class="background-image-container" id="img-container-3">
  <img src="images/grapa2.jpg" alt="Gracias">
  <div class="thanks-overlay" id="thanks-group">
    <span class="gra-3">GRA</span>
    <span class="extension-cia5">CIA5</span>
    <span class="pa-3">PA</span>
  </div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
/* SECCIONES 1 Y 2 */
const sections = [['overlay-top', 'museo', 'fia-superior'], ['overlay-bottom', 'esceno', 'fia-inferior']];
sections.forEach(group => {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const m = document.getElementById(group[0]), s1 = document.getElementById(group[1]), s2 = document.getElementById(group[2]);
      if (entry.isIntersecting) {
        m.classList.add('visible', 'shift'); s1.classList.add('visible'); s2.classList.add('visible');
        setTimeout(() => { if (m.classList.contains('visible')) { m.classList.add('fade-pa', 'recenter'); s1.classList.add('recenter'); s2.classList.add('recenter'); } }, 1200);
      } else { [m, s1, s2].forEach(el => el.classList.remove('visible', 'shift', 'fade-pa', 'recenter')); }
    });
  }, { threshold: 0.15 });
  obs.observe(document.getElementById(group[0]));
});

/* SECCIÓN 3: GRACIA5 (PASOS COHERENTES) */
const tGroup = document.getElementById('thanks-group');
const obs3 = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      // 1. Aparece y PA se separa (Mismo ritmo que arriba)
      tGroup.classList.add('visible-3', 'shift-3');
      
      // 2. A los 1.2s: PA desaparece y recentramos (Mismo ritmo que arriba)
      setTimeout(() => {
        if (!tGroup.classList.contains('visible-3')) return;
        tGroup.classList.add('fade-pa-3', 'recenter-3');
        
        // 3. Pequeño delay extra para que aparezca CIA5 suavemente al final
        setTimeout(() => {
          tGroup.classList.add('become-thanks');
        }, 300); 
        
      }, 1200); 
    } else {
      tGroup.classList.remove('visible-3', 'shift-3', 'fade-pa-3', 'become-thanks', 'recenter-3');
    }
  });
}, { threshold: 0.3 }); // Threshold para asegurar que el usuario vea la animación entera
obs3.observe(document.getElementById('img-container-3'));
</script>

</body>
</html>
