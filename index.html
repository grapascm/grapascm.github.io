<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPA</title>

<style>
@font-face {
  font-family: 'GRAPA';
  src: url('./fonts/GRAPA.woff2') format('woff2');
  font-display: swap;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { overflow-x: hidden; }

body {
  font-family: 'GRAPA', sans-serif;
  text-transform: uppercase;
  background-color: #0A1A2A;
  color: #BFC6CF;
}

/* HERO */
.hero {
  min-height: 100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding-top:20vh;
  padding-left:8vw;
  padding-right:8vw;
}

h1.hero-text {
  font-size: clamp(80px,15vw,200px);
  letter-spacing:0.04em;
  color:#E4E8ED;
  line-height:0.9;
}

.subtitle {
  margin-top:8vh;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:0.35em;
}

.email-button {
  margin-top:18vh;
  font-size:clamp(10px,1.2vw,14px);
  letter-spacing:0.3em;
  text-decoration:none;
  color:#E4E8ED;
  border:1px solid rgba(228,232,237,0.2);
  padding:1vh 2vw;
}

footer {
  position:fixed;
  bottom:60px;
  width:100%;
  text-align:center;
  font-size:clamp(10px,1vw,12px);
  opacity:0.5;
  pointer-events:none;
}

/* CONTENEDOR DE IMAGEN */
.background-image-container {
  position:relative;
  width:100%;
}

.background-image-container img {
  width:100%;
  height:auto;
  display:block;
}

/* BASE TEXTO */
.overlay-line {
  position:absolute;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  width:clamp(300px,70vw,1200px);
  color:#E4E8ED;
  opacity:0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  white-space:nowrap;
}

.center {
  text-align:center;
  font-size:clamp(100px,15vw,200px);
}

.center span {
  display:inline-block;
  transition: transform 0.6s ease, opacity 0.4s ease;
}

/* COREOGRAFÍA: PASO 2 - SHIFT */
.shift .pa {
  transform: translateX(0.35em);
  transition-delay:0.1s;
}

/* COREOGRAFÍA: PASO 3 - FADE */
.fade-pa .pa {
  opacity:0;
}

.left-align {
  text-align:left;
  padding-left:0.09em;
}

/* TAMAÑOS Y POSICIONES */
#museo          { font-size:clamp(55px,9.5vw,110px); top:21.5%; }
#esceno         { font-size:clamp(50px,9vw,100px); top:71.5%; }
#fia-superior   { font-size:clamp(70px,12vw,150px); top:31.5%; }
#fia-inferior   { font-size:clamp(70px,12vw,150px); top:81.5%; }
#overlay-top    { top:25%; }
#overlay-bottom { top:75%; }

/* ESTADO VISIBLE INICIAL */
.visible {
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.delay-1 { transition-delay: 0.1s; }
.delay-2 { transition-delay: 0.4s; }
.delay-3 { transition-delay: 0.7s; }
</style>
</head>

<body>

<div class="hero">
  <h1 class="hero-text">GRAPA</h1>
  <div class="subtitle">5ociedad Cooperativa Madrile&#241;a</div>
  <a href="mailto:grapa@grapa.e5" class="email-button">grapa@grapa.e5</a>
</div>

<div class="background-image-container" id="img-container">
  <img src="images/grapas.jpg" alt="">

  <div class="overlay-line center delay-1" id="overlay-top">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="museo">MU5EO</div>
  <div class="overlay-line left-align delay-3" id="fia-superior">FIA</div>

  <div class="overlay-line center delay-1" id="overlay-bottom">
    <span class="gra">GRA</span><span class="pa">PA</span>
  </div>
  <div class="overlay-line left-align delay-2" id="esceno">E5CENO</div>
  <div class="overlay-line left-align delay-3" id="fia-inferior">FIA</div>
</div>

<footer>&copy; 2025 GRAPA</footer>

<script>
// Función matemática de centrado corregida para mantener la coreografía
function centerBlock(grapaId, sideIds) {
  const containerW = document.getElementById('img-container').offsetWidth;
  const grapaEl = document.getElementById(grapaId);
  const sideEls = sideIds.map(id => document.getElementById(id));

  // Medimos el ancho de GRA (sin el PA que ya está en opacity 0)
  const graW = grapaEl.querySelector('.gra').getBoundingClientRect().width;
  const sideWs = sideEls.map(el => el.getBoundingClientRect().width);
  
  // El ancho real del bloque ahora es el máximo entre GRA solo y las palabras secundarias
  const blockW = Math.max(graW, ...sideWs);
  const blockLeft = (containerW - blockW) / 2;

  // Calculamos el offset necesario para que el borde izquierdo de cada elemento
  // se alinee con el borde izquierdo del bloque imaginario centrado.
  
  // Para GRAPA (que está en text-align center)
  const graOffset = blockLeft - (containerW/2 - graW/2);
  grapaEl.style.transition = 'opacity 0.6s ease, transform 0.9s cubic-bezier(0.4, 0, 0.2, 1)';
  grapaEl.style.transform = `translateX(calc(-50% + ${graOffset}px)) translateY(0)`;

  // Para los secundarios (MU5EO, FIA, etc)
  sideEls.forEach((el, i) => {
    const offset = blockLeft - (containerW/2 - sideWs[i]/2);
    el.style.transition = 'opacity 0.6s ease, transform 0.9s cubic-bezier(0.4, 0, 0.2, 1)';
    el.style.transform = `translateX(calc(-50% + ${offset}px)) translateY(0)`;
  });
}

const groups = [
  { trigger: 'museo', main: 'overlay-top', secondary: ['museo', 'fia-superior'] },
  { trigger: 'esceno', main: 'overlay-bottom', secondary: ['esceno', 'fia-inferior'] }
];

groups.forEach(group => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const mainEl = document.getElementById(group.main);
      const secEls = group.secondary.map(id => document.getElementById(id));

      if (entry.isIntersecting) {
        // PASO 1: Aparecen con sus delays de CSS
        mainEl.classList.add('visible');
        secEls.forEach(el => el.classList.add('visible'));

        // PASO 2: El ritmo de la 1.0 (400ms después de aparecer el secundario)
        setTimeout(() => {
          if (!entry.isIntersecting) return;
          mainEl.classList.add('shift');

          // PASO 3: Desaparece PA y Centra (400ms después del shift)
          setTimeout(() => {
            if (!entry.isIntersecting) return;
            mainEl.classList.add('fade-pa');
            
            // Pequeño margen para que el navegador asimile el cambio de layout antes de centrar
            setTimeout(() => {
              centerBlock(group.main, group.secondary);
            }, 50);
            
          }, 400);
        }, 400);

      } else {
        // RESET: Limpiamos todo al salir de vista
        mainEl.classList.remove('visible', 'shift', 'fade-pa');
        mainEl.style.transform = '';
        secEls.forEach(el => {
          el.classList.remove('visible');
          el.style.transform = '';
        });
      }
    });
  }, { threshold: 0.3 });

  observer.observe(document.getElementById(group.trigger));
});

// Recalcular en caso de cambio de tamaño de ventana
window.addEventListener('resize', () => {
  groups.forEach(group => {
    const mainEl = document.getElementById(group.main);
    if (mainEl.classList.contains('fade-pa')) {
      centerBlock(group.main, group.secondary);
    }
  });
});
</script>

</body>
</html>
